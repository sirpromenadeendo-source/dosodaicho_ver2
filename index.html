}
function syncInputUI(){
  // 項目スロット（混入物以外）
  const sl=_d('ws-slots');
  if(sl)sl.innerHTML=IFORDER.filter(k=>k!=='konnyu').map(key=>{
    const f=IF[key],v=ifVal(key);
    const cls='slot'+(f.span===3?' wide':f.span===6?' full':'')+(ifActive===key?' active':'');
    let inner;
    if(key==='hue')inner=`<span class="vl ${v?'':'empty'}">${v||'—'}</span>`;
    else if(key==='vc'){const hx=_curHex();const sw=hx?`<span class="sw" style="background:${hx}"></span>`:'';inner=`<span class="vl ${v?'':'empty'}">${sw}${v||'—'}</span>`;}
    else inner=`<span class="vl ${v?'':'empty'}">${_esc(v)||'—'}</span>`;
    return `<button class="${cls}" onclick="ifSelect('${key}')"><span class="lb">${f.label}</span>${inner}</button>`;
  }).join('');
  // 混入物テーブル（全幅）
  const kn=_d('ws-konnyu'); if(kn)kn.innerHTML=knTableHtml();
  // 写真パネル（左）
  if(typeof renderPhotoPanel==='function')renderPhotoPanel();
  function knTableHtml(){
    const rows=knRows();
    const head=`<tr><th>#</th>`+KN_FIELDS.map(f=>`<th>${f.label}</th>`).join('')+`<th></th></tr>`;
    const bodyRows=rows.length?rows.map((r,i)=>{
      const tds=KN_FIELDS.map((f,ci)=>{
        const val=r.vals[ci];const s=(ifActive==='konnyu'&&knEdit&&knEdit.id===r.id&&knEdit.key===f.key)?' kn-cell-sel':'';
        return `<td class="kn-cell${s}" onclick="ifKnCell('${r.id}','${f.key}')">${val?_esc(val):'<span class="kn-dash">—</span>'}</td>`;
      }).join('');
      return `<tr><td class="kn-no">${i+1}</td>${tds}<td class="kn-del" onclick="ifKnDelRow('${r.id}')">✕</td></tr>`;
    }).join(''):`<tr><td colspan="${KN_FIELDS.length+2}" style="color:#889;text-align:center;padding:10px">「＋ 行を追加」で混入物を作成</td></tr>`;
    return `<div class="slot-konnyu"><div class="skn-head"><span class="lb">混入物</span><button class="skn-add" onclick="ifKnAddRow()">＋ 行を追加</button></div><div style="overflow:auto"><table class="kn-table"><thead>${head}</thead><tbody>${bodyRows}</tbody></table></div></div>`;
  }
}
function _curHex(){
  const h=_d('hue').value,v=_d('value_').value,c=_d('chroma').value;
  const raw=h==='N'?(COLOR_HEX['N'+v+'/']||COLOR_HEX['N'+v+'/0']):COLOR_HEX[h+v+'/'+c];
  return raw?(typeof _mute==='function'?_mute(raw,h,c):raw):null;
}
function ifSelect(key){ifActive=key;knEdit=null;syncInputUI();ifRenderWS();}
function ifRenderWS(){
  const f=IF[ifActive];
  _d('ws-title').textContent=f.label;
  _d('ws-hint').textContent={list:'タップで選択',num:'数字を入力',hue:'色相→Value/Chromaへ',vc:'マスをタップ',text:'入力',konnyu:'ボタンで作って追加'}[f.type]||'';
  const b=_d('ws-body');
  if(f.type==='list')b.innerHTML=wsList(f);
  else if(f.type==='num')b.innerHTML=wsPad(f);
  else if(f.type==='hue')b.innerHTML=wsHueW();
  else if(f.type==='vc')b.innerHTML=wsVCW();
  else if(f.type==='text')b.innerHTML=wsTextW(f);
  else if(f.type==='konnyu')b.innerHTML=wsKonnyuW();
}
function wsList(f){
  const cur=_d(f.dom).value;
  const cells=MASTERS[f.master].filter(v=>v!=='').map(v=>`<button class="opt${v===cur?' sel':''}" onclick="ifSetList('${f.dom}','${v}')">${v}</button>`).join('');
  return `<div class="opt-grid">${cells}<button class="opt blank${cur===''?' sel':''}" onclick="ifSetList('${f.dom}','',true)">クリア</button></div>`+
    `<button class="opt" style="width:100%;margin-top:12px;background:#eef6fc;border-color:#2c5f8a;color:#2c5f8a" onclick="ifAdvance()">→ 次へ（変更せず進む）</button>`;
}
function ifAdvance(){const idx=IFORDER.indexOf(ifActive);if(idx>=0&&idx<IFORDER.length-1)ifSelect(IFORDER[idx+1]);}
function ifSetList(dom,v,noAdvance){_d(dom).value=v;updatePreview();if(noAdvance)ifRenderWS();else ifAdvance();}
function wsPad(f){
  const cur=_d(f.dom).value||'';
  const disp=cur||'—';
  const keys=['1','2','3','4','5','6','7','8','9','⌫','0','C'];
  return `<div class="pad"><div class="pad-disp">${disp}</div><div class="pad-grid">`+keys.map(k=>`<button class="key" onclick="ifPad('${ifActive}','${k}')">${k}</button>`).join('')+`</div><button class="opt" style="width:100%;margin-top:12px;background:#eef6fc;border-color:#2c5f8a;color:#2c5f8a" onclick="ifAdvance()">→ 次へ</button></div>`;
}
function ifPad(key,k){
  const f=IF[key];let cur=_d(f.dom).value||'';
  // padで先頭0が付く場合を解除して数値文字列に
  let base=cur.replace(/^0+(?=\d)/,'');
  if(k==='C')base='';
  else if(k==='⌫')base=base.slice(0,-1);
  else{const nx=(base+k).replace(/^0+(?=\d)/,'');if(nx!==''&&parseInt(nx,10)<=f.max)base=nx;}
  const val=base===''?'':(f.pad?base.padStart(f.pad,'0'):base);
  _d(f.dom).value=val;updatePreview();ifRenderWS();
}
function wsTextW(f){
  const val=_esc(_d(f.dom).value);
  const nextBtn=`<button class="opt" style="width:100%;margin-top:10px;background:#eef6fc;border-color:#2c5f8a;color:#2c5f8a" onclick="ifAdvance()">→ 次へ</button>`;
  if(f.dom==='biko')return `<textarea class="ws-text" placeholder="${f.ph||''}" oninput="ifSetText('${f.dom}',this.value)">${val}</textarea>`+nextBtn;
  return `<input class="ws-text" placeholder="${f.ph||''}" value="${val}" oninput="ifSetText('${f.dom}',this.value)">`+nextBtn;
}
function ifSetText(dom,v){_d(dom).value=v;updatePreview();}  // ワークスペースは再描画しない（入力継続）
function txtOnHex(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return (0.299*r+0.587*g+0.114*b)/255>0.6?'#222':'#fff';}
function wsHueW(){
  const cur=_d('hue').value;
  return `<div class="hue-grid" style="max-width:560px">`+MASTERS.hue.filter(h=>h).map(h=>{
    const rep=(typeof _repHueHex==='function'?_repHueHex(h):null)||'#ccc';
    return `<button class="hue-cell${h===cur?' sel':''}" style="background:${rep};color:${txtOnHex(rep)}" onclick="ifPickHue('${h}')">${h}</button>`;
  }).join('')+`</div>`;
}
function ifPickHue(h){if(typeof _setSel==='function')_setSel('hue',h);else _d('hue').value=h;if(h==='N'&&typeof _setSel==='function')_setSel('chroma','');updateColor();ifSelect('vc');}
function wsVCW(){
  const hue=_d('hue').value;
  if(!hue)return `<div style="color:#667">先に Hue を選んでください。<button class="opt" style="display:inline-block;margin-left:8px" onclick="ifSelect('hue')">Hueを選ぶ</button></div>`;
  const idx=(typeof HUE_INDEX!=='undefined')?HUE_INDEX[hue]:null;
  const curV=_d('value_').value,curC=_d('chroma').value;
  const vals=[...(idx?idx.vals:[])].sort((a,b)=>parseFloat(b)-parseFloat(a));
  let line=`<div class="vc-hue-line">Hue: <b>${hue}</b> <button type="button" onclick="ifSelect('hue')">Hueを変更</button></div>`;
  const cell=(v,c)=>{const raw=hue==='N'?(COLOR_HEX['N'+v+'/']||COLOR_HEX['N'+v+'/0']):COLOR_HEX[hue+v+'/'+c];return raw?(_mute?_mute(raw,hue,c):raw):null;};
  if(hue==='N'){
    return line+`<table class="vc-grid"><thead><tr><th style="width:80px">Value</th><th>土色名</th></tr></thead><tbody>`+
      vals.map(v=>{const nm=idx.cells[v+'|']||idx.cells[v+'|0']||'';const hx=cell(v,'')||'#fff';const s=v===curV?' sel':'';
        return `<tr><td style="background:${hx}"><button class="vc-cell${s}" style="color:${txtOnHex(hx)}" onclick="ifPickVC('${v}','')"><span class="vc-code" style="color:inherit">${v}/</span></button></td><td style="text-align:left;padding:4px 10px;font-size:12px;color:#456">${nm}</td></tr>`;}).join('')+`</tbody></table>`;
  }
  const chs=[...(idx?idx.chromas:[])].sort((a,b)=>parseFloat(a)-parseFloat(b));
  const head=`<tr><th>V＼C</th>`+chs.map(c=>`<th>${c}</th>`).join('')+`</tr>`;
  const rows=vals.map(v=>`<tr><th>${v}</th>`+chs.map(c=>{
    const nm=idx.cells[v+'|'+c];if(!nm)return `<td class="vc-empty"></td>`;
    const hx=cell(v,c)||'#eee';const s=(v===curV&&c===curC)?' sel':'';
    return `<td style="background:${hx}"><button class="vc-cell${s}" style="color:${txtOnHex(hx)}" onclick="ifPickVC('${v}','${c}')"><span class="vc-code" style="color:inherit">${v}/${c}</span><span class="vc-name" style="color:inherit;opacity:.85">${nm}</span></button></td>`;
  }).join('')+`</tr>`).join('');
  return line+`<div style="overflow:auto"><table class="vc-grid"><thead>${head}</thead><tbody>${rows}</tbody></table></div>`;
}
function ifPickVC(v,c){if(typeof _setSel==='function'){_setSel('value_',v);_setSel('chroma',c);}else{_d('value_').value=v;_d('chroma').value=c;}updateColor();ifAdvance();}
// ---- 混入物（テーブルは上段、セル編集はここ）----
function knRows(){return [...document.querySelectorAll('#konnyuList .konkyu-item')].map(it=>{
  const sels=it.querySelectorAll('select');const idn=(it.id||'').replace('konnyu_','');
  return {id:idn, vals:KN_FIELDS.map(f=>sels[f.idx]?sels[f.idx].value:'')};
});}
function wsKonnyuW(){
  if(!knEdit)return `<div style="color:#889">上の混入物テーブルのセルをタップすると、ここで編集できます。<br>行が無ければ「＋ 行を追加」で作成してください。</div>`;
  const f=KN_FIELDS.find(x=>x.key===knEdit.key);
  const row=knRows().find(r=>r.id===knEdit.id);
  if(!row)return `<div style="color:#889">行が見つかりません。</div>`;
  const cur=row.vals[f.idx];
  const rowNo=knRows().findIndex(r=>r.id===knEdit.id)+1;
  const btns=knMaster(knEdit.key).map(v=>`<button class="opt${v===cur?' sel':''}${v===''?' blank':''}" onclick="ifKnSet('${knEdit.id}','${knEdit.key}','${v}')">${v===''?'なし':v}</button>`).join('');
  const isLast=KN_FIELDS.findIndex(x=>x.key===knEdit.key)===KN_FIELDS.length-1;
  const next=isLast?'':`<button class="opt" style="width:100%;margin-top:12px;background:#eef6fc;border-color:#2c5f8a;color:#2c5f8a" onclick="ifKnNext()">→ 次へ（変更せず進む）</button>`;
  return `<div class="kn-lb" style="margin-bottom:8px">行${rowNo} の「${f.label}」を選択</div><div class="opt-grid">${btns}</div>${next}`;
}
function ifKnAddRow(){addKonnyu({});const rows=knRows();ifActive='konnyu';knEdit=rows.length?{id:rows[rows.length-1].id,key:'type'}:null;syncInputUI();ifRenderWS();}
function ifKnCell(id,key){ifActive='konnyu';knEdit={id,key};syncInputUI();ifRenderWS();}
function ifKnSet(id,key,val){
  const it=document.getElementById('konnyu_'+id);if(!it)return;
  const f=KN_FIELDS.find(x=>x.key===key);const sel=it.querySelectorAll('select')[f.idx];
  if(sel)sel.value=val;
  const i=KN_FIELDS.findIndex(x=>x.key===key);
  if(i>=0&&i<KN_FIELDS.length-1) knEdit={id,key:KN_FIELDS[i+1].key};  // 次のセルへ自動送り
  updatePreview();ifRenderWS();
}
function ifKnNext(){
  if(!knEdit)return;
  const i=KN_FIELDS.findIndex(x=>x.key===knEdit.key);
  if(i>=0&&i<KN_FIELDS.length-1){knEdit={id:knEdit.id,key:KN_FIELDS[i+1].key};syncInputUI();ifRenderWS();}
}
function ifKnDelRow(id){if(typeof removeKonnyu==='function')removeKonnyu(Number(id));if(knEdit&&knEdit.id===id)knEdit=null;updatePreview();ifRenderWS();}
// ---- 写真パネル（上段左・メイン大＋サムネイル小）----
let ifSelectedPhoto=null;
function ifCurrentCode(){ // 写真の保存キー（遺構コード＋付帯施設）
  const t=_d('ikoType').value,n=_d('ikoNum').value;
  if(!t||!n)return '';
  const code=t+String(n).padStart(2,'0');
  const f=(_d('futai').value||'').trim();
  return f?`${code}__${f}`:code;
}
function ifUnitLabel(){
  const t=_d('ikoType').value,n=_d('ikoNum').value;
  if(!t||!n)return '';
  return t+String(n).padStart(2,'0')+((_d('futai').value||'').trim());
}
function ifSetSelectedPhoto(id){ifSelectedPhoto=id;}
function ifSelectPhoto(id){ifSelectedPhoto=id;renderPhotoPanel();}
function renderPhotoPanel(){
  const el=_d('ws-photo'); if(!el)return;
  const code=ifCurrentCode();
  const photos=code?(groupPhotos[code]||[]):[];
  let sel=photos.find(p=>p.id===ifSelectedPhoto);
  if(!sel)sel=photos[photos.length-1]||null;   // 未選択・無効なら最新を大表示
  ifSelectedPhoto=sel?sel.id:null;
  const sig=code+'#'+photos.map(p=>p.id+':'+((p.dataUrl||'').length)).join(',')+'|sel:'+ifSelectedPhoto;
  if(el.dataset.sig===sig)return;
  el.dataset.sig=sig; el.innerHTML='';
  const t=document.createElement('div');t.className='if-photo-title';t.textContent='📷 写真';el.appendChild(t);
  if(!code){const m=document.createElement('div');m.className='if-photo-empty';m.innerHTML='遺構種別・番号を選ぶと<br>ここで撮影できます';el.appendChild(m);return;}
  const cl=document.createElement('div');cl.className='if-photo-code';cl.textContent=(ifUnitLabel()||code)+' の写真'+(photos.length?`（${photos.length}枚）`:'');el.appendChild(cl);
  if(sel){
    const hero=document.createElement('div');hero.className='if-photo-hero';
    hero.innerHTML=`<img src="${sel.dataUrl}" alt="">
      <button class="hbtn hedit" title="注記" onclick="openDrawModal('${code}','${sel.id}')">✏️</button>
      <button class="hbtn hdel" title="削除" onclick="deletePhoto('${code}','${sel.id}')">✕</button>
      <div class="cap" onclick="editCaption('${code}','${sel.id}')">${_esc(sel.caption)||'（メモを追加）'}</div>`;
    el.appendChild(hero);
  }
  if(photos.length>1){
    const th=document.createElement('div');th.className='if-photo-thumbs';
    photos.forEach(p=>{
      const d=document.createElement('div');d.className='if-photo-thumb'+(p.id===ifSelectedPhoto?' sel':'');
      d.innerHTML=`<img src="${p.dataUrl}" alt="">`;
      d.onclick=()=>ifSelectPhoto(p.id);
      th.appendChild(d);
    });
    el.appendChild(th);
  }
  const bw=document.createElement('div');bw.className='if-photo-btns';
  const cam=document.createElement('button');cam.className='if-photo-btn';cam.textContent='📷 撮影';cam.onclick=()=>_d('ifPhotoCam').click();
  const lib=document.createElement('button');lib.className='if-photo-btn';lib.textContent='🖼 選択';lib.onclick=()=>_d('ifPhotoLib').click();
  bw.appendChild(cam);bw.appendChild(lib);el.appendChild(bw);
}
function refreshPhotoPanel(){const el=_d('ws-photo');if(el)el.dataset.sig='';renderPhotoPanel();}
(function wirePhotoInputs(){
  const cam=_d('ifPhotoCam'),lib=_d('ifPhotoLib');
  const guard=(e,drawAfter)=>{const c=ifCurrentCode();if(!c){alert('先に遺構種別・遺構番号を選んでください');e.target.value='';return;}handlePhotoInput(e,c,drawAfter);};
  if(cam)cam.onchange=e=>guard(e,true);   // 撮影→そのまま手書き
  if(lib)lib.onchange=e=>guard(e,false);  // 選択→通常
})();
// 初期描画
ifRenderWS();syncInputUI();
</script>
</body>
</html>
