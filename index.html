<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>土層台帳 入力アプリ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Meiryo',sans-serif;font-size:15px;background:#f4f4f4;color:#222}
header{background:#2c5f8a;color:#fff;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
header h1{font-size:16px;font-weight:bold}
.header-btns{display:flex;gap:6px;flex-wrap:wrap}
.btn{padding:6px 10px;border:none;border-radius:5px;cursor:pointer;font-size:13px;font-weight:bold}
.btn-white{background:#fff;color:#2c5f8a}
.btn-green{background:#2ecc71;color:#fff}
.btn-red{background:#e74c3c;color:#fff}
.btn-orange{background:#e67e22;color:#fff}
.btn-blue{background:#3498db;color:#fff}
.btn-gray{background:#888;color:#fff}
.tabs{display:flex;background:#1a3f60;position:sticky;top:52px;z-index:99}
.tab{flex:1;padding:10px 4px;text-align:center;color:#aad;cursor:pointer;font-size:13px;border-bottom:3px solid transparent}
.tab.active{color:#fff;border-bottom:3px solid #4fc3f7;font-weight:bold}
.panel{display:none;padding:12px}
.panel.active{display:block}

/* 入力フォーム */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.form-group{display:flex;flex-direction:column;gap:3px}
.form-group.full{grid-column:1/-1}
label{font-size:12px;color:#555;font-weight:bold}
select,input[type=text],input[type=number],textarea{
  width:100%;padding:8px;border:1px solid #ccc;border-radius:5px;
  font-size:15px;background:#fff;-webkit-appearance:none
}
textarea{height:60px;resize:vertical}
.preview-box{background:#fff;border:1px solid #ddd;border-radius:8px;padding:10px;margin-top:10px}
.preview-box h3{font-size:13px;color:#555;margin-bottom:6px}
.preview-val{font-size:15px;color:#222;min-height:20px}
.preview-val.auto{color:#1a6bb5;font-weight:bold}
.preview-val.empty{color:#aaa;font-style:italic}
.copy-btn{margin-top:6px;font-size:12px;padding:5px 10px}

/* 混入物 */
.konkyu-list{margin:6px 0;display:flex;flex-direction:column;gap:6px}
.konkyu-item{background:#e8f4ff;border-radius:6px;padding:8px;position:relative}
.konkyu-item .remove-btn{position:absolute;right:6px;top:6px;background:#e74c3c;color:#fff;border:none;border-radius:3px;padding:2px 7px;font-size:12px;cursor:pointer}
.konkyu-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr 1fr;gap:4px;align-items:center}
.konkyu-label{font-size:11px;color:#555;text-align:center}
.add-konkyu-btn{background:#3498db;color:#fff;border:none;border-radius:5px;padding:7px 12px;font-size:13px;cursor:pointer;width:100%;margin-top:4px}

/* 一覧 */
.list-table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:600px}
th{background:#2c5f8a;color:#fff;padding:7px 6px;text-align:left;white-space:nowrap}
td{padding:6px;border-bottom:1px solid #ddd;vertical-align:top}
tr:hover td{background:#f0f7ff}
.edit-btn{background:#3498db;color:#fff;border:none;border-radius:3px;padding:3px 8px;cursor:pointer;font-size:12px}
.del-btn{background:#e74c3c;color:#fff;border:none;border-radius:3px;padding:3px 8px;cursor:pointer;font-size:12px}
.action-bar{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.count-badge{background:#2c5f8a;color:#fff;padding:4px 10px;border-radius:12px;font-size:13px}

/* アコーディオン */
.group-header{
  display:flex;align-items:center;justify-content:space-between;
  background:#2c5f8a;color:#fff;padding:10px 12px;
  border-radius:6px;margin-bottom:4px;cursor:pointer;
  user-select:none;
}
.group-header:hover{background:#1a3f60}
.group-title{font-weight:bold;font-size:15px}

/* 写真台帳印刷プレビューモーダル */
.ledger-modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:999;background:rgba(0,0,0,0.7);flex-direction:column}
.ledger-modal.open{display:flex}
.ledger-modal-bar{background:#1a3f60;padding:8px 12px;display:flex;gap:8px;align-items:center}
.ledger-modal-bar span{color:#fff;font-size:14px;font-weight:bold;flex:1}
.ledger-modal-body{flex:1;overflow-y:auto;background:#ddd;padding:10px}
.ledger-page{background:#fff;max-width:800px;margin:0 auto 16px;padding:20px;font-family:'Hiragino Sans','Meiryo',sans-serif;font-size:12px}
.ledger-page-title{font-size:16px;font-weight:bold;border-bottom:2px solid #2c5f8a;padding-bottom:6px;margin-bottom:12px;color:#2c5f8a}
.ledger-photos{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.ledger-photo-item{text-align:center}
.ledger-photo-item img{display:block;border:1px solid #ccc;object-fit:cover}
.ledger-photo-item .ledger-photo-cap{font-size:10px;color:#555;margin-top:2px;max-width:150px;word-break:break-all}
.ledger-table{width:100%;border-collapse:collapse;font-size:11px}
.ledger-table th{background:#2c5f8a;color:#fff;padding:5px 4px;text-align:center;border:1px solid #aac}
.ledger-table td{padding:4px 5px;border:1px solid #ccc;vertical-align:top}
.ledger-table tr:nth-child(even) td{background:#f5f9ff}
.ledger-no-photo{color:#aaa;font-size:12px;margin-bottom:10px}

@media print {
  header,div.tabs,.panel:not(#panel-print),
  .ledger-modal-bar{display:none!important}
  .ledger-modal{position:static!important;background:none!important;display:block!important}
  .ledger-modal-body{overflow:visible!important;background:none!important;padding:0!important}
  .ledger-page{box-shadow:none!important;page-break-after:always}
}
.group-meta{font-size:12px;color:#aad;margin-left:8px}
.group-arrow{font-size:14px;transition:transform 0.2s}
.group-arrow.open{transform:rotate(90deg)}
.group-body{display:none;margin-bottom:10px}
.group-body.open{display:block}

/* 保存ボタン */
.save-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.save-btns .btn{padding:12px;font-size:14px}
.notice{color:#888;font-size:12px;margin-top:6px;text-align:center}

/* サブアコーディオン（付帯施設） */
.sub-group-header{
  display:flex;align-items:center;justify-content:space-between;
  background:#1a4f70;color:#fff;padding:8px 12px;
  border-radius:5px;margin:6px 0 3px;cursor:pointer;
  user-select:none;
}
.sub-group-header:hover{background:#0f3550}
.sub-group-title{font-weight:bold;font-size:13px}
.sub-group-arrow{font-size:12px;transition:transform 0.2s}
.sub-group-arrow.open{transform:rotate(90deg)}
.sub-group-body{display:none;padding-left:4px}
.sub-group-body.open{display:block}
.photo-area{padding:10px;border-top:1px solid #d0dde8;margin-top:6px}
.photo-area-title{font-size:12px;font-weight:bold;color:#2c5f8a;margin-bottom:8px}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-bottom:8px}
.photo-card{position:relative;border-radius:6px;overflow:hidden;background:#e8f0f7;border:1px solid #c0d4e8}
.photo-card img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;cursor:pointer}
.photo-card .photo-caption{font-size:11px;padding:3px 5px;background:rgba(0,0,0,0.55);color:#fff;position:absolute;bottom:0;left:0;right:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.photo-card .photo-del{position:absolute;top:3px;right:3px;background:rgba(231,76,60,0.85);color:#fff;border:none;border-radius:3px;padding:1px 6px;font-size:12px;cursor:pointer}
.photo-card .photo-edit-btn{position:absolute;top:3px;left:3px;background:rgba(52,152,219,0.85);color:#fff;border:none;border-radius:3px;padding:1px 6px;font-size:12px;cursor:pointer}
.photo-add-btns{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:2px}
.photo-add-btn{background:#fff;border:2px dashed #2c5f8a;border-radius:6px;color:#2c5f8a;font-size:13px;font-weight:bold;padding:8px;width:100%;cursor:pointer}
.photo-add-btn:hover{background:#eaf3fb}
.photo-input{display:none}

/* 手書きモーダル */
.draw-modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:1000;background:rgba(0,0,0,0.85);flex-direction:column}
.draw-modal.open{display:flex}
.draw-toolbar{background:#1a3f60;padding:8px 10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.draw-toolbar label{color:#fff;font-size:12px}
.draw-toolbar input[type=color]{width:36px;height:30px;border:none;border-radius:4px;padding:0;cursor:pointer}
.draw-toolbar input[type=range]{width:80px}
.draw-canvas-wrap{flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#222}
#drawCanvas{position:absolute;top:0;left:0;width:100%;height:100%;touch-action:none;cursor:crosshair}
.draw-canvas-stack{position:relative;max-width:100%;max-height:100%;display:inline-block;line-height:0}
#drawBgCanvas{display:block;max-width:100%;max-height:100%}
.draw-actions{background:#1a3f60;padding:8px 10px;display:flex;gap:8px;justify-content:flex-end}
/* ===== 土色ピッカー（Hue / Value-Chroma） ===== */
.color-pick-btn{width:100%;padding:8px 6px;font-size:14px;font-weight:bold;color:#2c5f8a;background:#fff;border:1px solid #b7c6d6;border-radius:6px;cursor:pointer;text-align:center;min-height:38px}
.color-pick-btn:active{background:#eef4fa}
.color-modal{display:none;position:fixed;inset:0;z-index:1200;background:rgba(0,0,0,0.6);align-items:center;justify-content:center;padding:10px}
.color-modal.open{display:flex}
.color-modal-box{background:#fff;border-radius:10px;max-width:640px;width:100%;max-height:88vh;display:flex;flex-direction:column;overflow:hidden}
.color-modal-bar{background:#2c5f8a;color:#fff;padding:10px 14px;display:flex;align-items:center;gap:10px}
.color-modal-bar .cm-title{flex:1;font-weight:bold;font-size:15px}
.color-modal-bar .cm-close{background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:6px;padding:6px 12px;font-size:14px;cursor:pointer}
.color-modal-body{padding:12px;overflow:auto}
.hue-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.hue-cell{padding:12px 4px;font-size:15px;font-weight:bold;border:1px solid #b7c6d6;border-radius:6px;background:#f7fafd;color:#234;cursor:pointer;text-align:center}
.hue-cell.sel{background:#2c5f8a;color:#fff;border-color:#2c5f8a}
.vc-hue-line{font-size:13px;color:#555;margin-bottom:8px}
.vc-hue-line b{color:#2c5f8a;font-size:16px}
.vc-hue-line button{margin-left:8px;font-size:12px;padding:3px 8px;border:1px solid #b7c6d6;border-radius:5px;background:#fff;color:#2c5f8a;cursor:pointer}
table.vc-grid{border-collapse:collapse;width:100%}
table.vc-grid th{background:#eef2f6;color:#456;font-size:12px;padding:4px;border:1px solid #d5dee7;position:sticky}
table.vc-grid td{border:1px solid #d5dee7;padding:0;text-align:center;vertical-align:middle}
.vc-cell{width:100%;min-height:44px;padding:4px 2px;border:none;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px}
.vc-cell .vc-code{font-size:12px;font-weight:bold;color:#123}
.vc-cell .vc-name{font-size:10px;color:#556;line-height:1.1}
.vc-cell.sel{outline:3px solid #e67e22;outline-offset:-3px}
.vc-empty{background:repeating-linear-gradient(45deg,#f4f4f4,#f4f4f4 4px,#eaeaea 4px,#eaeaea 8px)}
/* ===== 新入力UI（スロット→ワークスペース） ===== */
#panel-input.active{display:flex;flex-direction:column;height:calc(100dvh - 96px);padding:0;overflow:hidden}
.slots-wrap{flex:none;background:#fff;border-bottom:2px solid #2c5f8a;padding:8px 10px;overflow:auto;max-height:50%;display:flex;flex-direction:column;gap:8px}
.top-row{display:flex;gap:8px;align-items:flex-start}
.photo-col{flex:none;width:34%;max-width:300px;border:1px solid #dbe3ec;border-radius:8px;background:#f7fafd;padding:6px}
.fields-col{flex:1;min-width:0}
.if-photo-title{font-size:11px;font-weight:700;color:#2c5f8a;margin-bottom:4px}
.if-photo-code{font-size:11px;color:#7d8da3;margin-bottom:5px}
.if-photo-empty{font-size:12px;color:#98a6b6;text-align:center;padding:18px 4px;line-height:1.5}
.if-photo-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;margin-bottom:6px}
.if-photo-grid:empty{display:none}
.if-photo-btns{display:flex;gap:5px}
.if-photo-btn{flex:1;background:#2c5f8a;color:#fff;border:none;border-radius:6px;padding:8px 4px;font-size:12px;font-weight:700;cursor:pointer}
.if-photo-hero{position:relative;border-radius:6px;overflow:hidden;background:#000;border:1px solid #c0d4e8;margin-bottom:6px}
.if-photo-hero img{width:100%;display:block;max-height:260px;object-fit:contain;background:#000}
.if-photo-hero .cap{font-size:11px;padding:4px 8px;background:rgba(0,0,0,.55);color:#fff;position:absolute;bottom:0;left:0;right:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.if-photo-hero .hbtn{position:absolute;top:5px;width:28px;height:28px;border-radius:50%;border:none;color:#fff;font-size:13px;cursor:pointer;line-height:1}
.if-photo-hero .hdel{right:5px;background:rgba(231,76,60,.92)}
.if-photo-hero .hedit{right:39px;background:rgba(44,95,138,.92)}
.if-photo-thumbs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.if-photo-thumb{width:46px;height:46px;border-radius:4px;overflow:hidden;border:2px solid transparent;cursor:pointer;flex:none;background:#000}
.if-photo-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.if-photo-thumb.sel{border-color:#4fc3f7}
.slots{display:grid;grid-template-columns:repeat(6,1fr);gap:6px}
.slot{grid-column:span 2;text-align:left;border:1px solid #dbe3ec;border-left:4px solid #dbe3ec;border-radius:8px;background:#fbfcfe;padding:6px 9px;cursor:pointer;display:flex;flex-direction:column;gap:1px;min-height:50px}
.slot .lb{font-size:10.5px;color:#7d8da3}
.slot .vl{font-size:16px;font-weight:700;color:#213041;line-height:1.2;display:flex;align-items:center;gap:6px;min-height:19px}
.slot .vl.empty{color:#b7c2cf;font-weight:500}
.slot.active{border-color:#2c5f8a;border-left-color:#4fc3f7;background:#eef6fc}
.slot .sw{width:16px;height:16px;border-radius:3px;border:1px solid #b7c2cf;flex:none}
.slot .badge{font-size:11px;background:#2c5f8a;color:#fff;border-radius:10px;padding:1px 8px;font-weight:700}
.slot.wide{grid-column:span 3}
.slot.full{grid-column:span 6}
.ws{flex:1;min-height:0;display:flex;flex-direction:column;background:#f4f7fa}
.ws-head{flex:none;padding:8px 14px;background:#152a3e;color:#fff;display:flex;align-items:center;gap:8px}
.ws-head .k{font-size:11px;color:#9fc3e0}
.ws-head .t{font-size:15px;font-weight:700}
.ws-head .hint{margin-left:auto;font-size:11px;color:#9fb6cd}
.ws-body{flex:1;overflow:auto;padding:12px}
.opt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(76px,1fr));gap:8px}
.opt{border:1px solid #dbe3ec;border-radius:8px;background:#fff;padding:12px 6px;font-size:15px;font-weight:600;color:#213041;cursor:pointer;text-align:center}
.opt.sel{background:#2c5f8a;color:#fff;border-color:#2c5f8a}
.opt.blank{color:#aab4c0;font-weight:500}
.opt.sm{padding:9px 12px;font-size:14px;min-width:46px}
.pad{max-width:300px;margin:0 auto}
.pad-disp{font-size:32px;font-weight:800;text-align:center;padding:8px;border:2px solid #2c5f8a;border-radius:10px;background:#fff;letter-spacing:.06em;margin-bottom:10px;color:#2c5f8a}
.pad-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.key{padding:15px;font-size:21px;font-weight:700;border:1px solid #dbe3ec;border-radius:10px;background:#fff;cursor:pointer;text-align:center}
textarea.ws-text,input.ws-text{width:100%;border:1px solid #dbe3ec;border-radius:8px;padding:12px;font-size:16px;font-family:inherit;background:#fff}
textarea.ws-text{min-height:110px;resize:vertical}
.kn-add{background:#fff;border:1px dashed #2c5f8a;border-radius:8px;padding:12px;margin-top:4px}
.kn-field{margin-bottom:12px}
.kn-lb{font-size:12px;color:#556;margin-bottom:6px;font-weight:700}
.kn-lb2{font-size:11px;color:#889;margin:8px 0 4px}
.btn-row{display:flex;flex-wrap:wrap;gap:6px}
.kn-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.kn-item{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #dbe3ec;border-radius:8px;padding:8px 10px;font-size:14px}
.kn-item .x{margin-left:auto;color:#e74c3c;cursor:pointer;font-weight:700;padding:2px 6px}
.kn-table{border-collapse:collapse;width:100%;font-size:13px}
.kn-table th{background:#e9eef4;color:#456;font-size:11px;padding:5px 6px;border:1px solid #d5dee7;white-space:nowrap}
.kn-table td{border:1px solid #d5dee7;padding:0}
.kn-cell{padding:9px 8px;text-align:center;cursor:pointer;min-width:50px;white-space:nowrap;font-weight:600}
.kn-cell:active{background:#eef6fc}
.kn-cell.kn-cell-sel{background:#2c5f8a;color:#fff}
.kn-dash{color:#b7c2cf;font-weight:400}
.kn-cell-sel .kn-dash{color:#9fb6cd}
.kn-no{background:#f4f7fa;color:#556;text-align:center;font-weight:700;padding:8px}
.kn-del{color:#e74c3c;text-align:center;cursor:pointer;font-weight:700;padding:8px}
.kn-editor{border-top:1px dashed #c9d3de;margin-top:12px;padding-top:12px}
.slot-konnyu{grid-column:span 6;border:1px solid #dbe3ec;border-radius:8px;background:#fbfcfe;padding:6px 8px}
.skn-head{display:flex;align-items:center;gap:10px;margin-bottom:5px}
.skn-head .lb{font-size:10.5px;color:#7d8da3;font-weight:700}
.skn-add{margin-left:auto;background:#3498db;color:#fff;border:none;border-radius:6px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer}
@media(max-width:820px){.slot-konnyu{grid-column:span 4}}
/* ===== 設定マスタ編集 ===== */
.master-group{margin-bottom:14px;border:1px solid #e4ebf2;border-radius:8px;padding:10px 12px;background:#fff}
.master-glabel{font-size:13px;font-weight:700;color:#2c5f8a;margin-bottom:8px}
.master-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.master-chip{display:inline-flex;align-items:center;gap:6px;background:#eef4fa;border:1px solid #cfe0ee;border-radius:16px;padding:4px 6px 4px 12px;font-size:13px;color:#213041}
.master-chip button{border:none;background:#c0d0e0;color:#fff;border-radius:50%;width:18px;height:18px;font-size:11px;line-height:1;cursor:pointer;font-weight:700}
.master-chip button:active{background:#e74c3c}
.master-add{display:flex;gap:6px}
.master-add input{flex:1;padding:8px;border:1px solid #ccc;border-radius:6px;font-size:14px}
.ws-result{flex:none;background:#fff;border-top:2px solid #2c5f8a;padding:7px 12px;display:flex;align-items:center;gap:14px;overflow:auto}
.ws-result .cell{display:flex;flex-direction:column;gap:1px;flex:none}
.ws-result .cl{font-size:10px;color:#7d8da3}
.ws-result .cv{font-size:14px;font-weight:700;display:flex;align-items:center;gap:5px}
.ws-result .allbox{flex:1;min-width:200px}
.ws-result .allv{font-size:12.5px;font-weight:500;color:#2b3a4b;line-height:1.3}
.ws-actions{flex:none;display:grid;grid-template-columns:2fr 2fr 1fr;gap:8px;padding:8px 12px;background:#e7edf3}
@media(max-width:820px){.slots{grid-template-columns:repeat(4,1fr)}.slot,.slot.wide{grid-column:span 2}.slot.full{grid-column:span 4}}
</style>
</head>
<body>

<header>
  <h1>🏺 土層台帳</h1>
  <div id="autoSaveStatus" style="font-size:11px;color:#aad">自動保存：未保存</div>
</header>

<!-- 現場名・ページ数バー -->
<div style="background:#152a3e;padding:8px 12px;display:flex;gap:8px;align-items:center;border-bottom:1px solid #2c5f8a">
  <div style="display:flex;align-items:center;gap:6px;flex:1">
    <label style="font-size:12px;color:#7eb8e0;white-space:nowrap;font-weight:bold">現場名</label>

// localStorage追加マスタをマージ
function loadLocalMasters() {
  try {
    const saved = JSON.parse(localStorage.getItem('dosoMasters') || '{}');
    Object.keys(saved).forEach(k => {
      if (MASTERS[k]) saved[k].forEach(v => { if (!MASTERS[k].includes(v)) MASTERS[k].push(v); });
    });
    const del = JSON.parse(localStorage.getItem('dosoMastersDel') || '{}');
    Object.keys(del).forEach(k => {
      if (MASTERS[k]) MASTERS[k] = MASTERS[k].filter(v => !del[k].includes(v));
    });
  } catch(e) {}
}

let records = [];

// ===== 初期化 =====
function init() {
  loadLocalMasters();
  buildSelects();
  buildMasterEditor();
  renderList();
  updatePreview();
}

function buildSelects() {
  // 遺構番号 01〜99
  const ikoNumEl = document.getElementById('ikoNum');
  ikoNumEl.innerHTML = '<option value="">--</option>';
  for (let i = 1; i <= 99; i++) {
    const v = String(i).padStart(2, '0');
    const o = document.createElement('option');
    o.value = v; o.textContent = v;
    ikoNumEl.appendChild(o);
  }
  ikoNumEl.addEventListener('change', updatePreview);

  // 層番 1〜99
  const sobanEl = document.getElementById('soban');
  sobanEl.innerHTML = '<option value="">--</option>';
  for (let i = 1; i <= 99; i++) {
    const o = document.createElement('option');
    o.value = String(i); o.textContent = String(i);
    sobanEl.appendChild(o);
  }
  sobanEl.addEventListener('change', updatePreview);

  const defs = [
    ['ikoType', 'ikoType'],
    ['spl', 'spl'],
    ['hue', 'hue'],
    ['value_', 'value_'],
    ['chroma', 'chroma'],
    ['doshu', 'doshu'],
    ['shimari', 'shimari'],
    ['nendo', 'nendo'],
  ];
  defs.forEach(([id, key]) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = '';
    MASTERS[key].forEach(v => {
      const o = document.createElement('option');
      o.value = v; o.textContent = v || '---';
      el.appendChild(o);
    });
    el.addEventListener('change', updatePreview);
  });
  document.getElementById('seikaku').addEventListener('input', updatePreview);
  document.getElementById('biko').addEventListener('input', updatePreview);
}

// ===== 土色検索 =====
function getColorName(hue, val, chr) {
  if (!hue || !val || !chr) return null;
  // N系は特殊
  if (hue === 'N') {
    const key = `N${val}/`;
    return COLOR_MASTER[key] || null;
  }
  const key = `${hue}${val}/${chr}`;
  return COLOR_MASTER[key] || null;
}

function updateColor() { updatePreview(); }

function updatePreview() {
  const ikoType = document.getElementById('ikoType').value;
  const ikoNum  = document.getElementById('ikoNum').value;
  const spl     = document.getElementById('spl').value;
  const soban   = document.getElementById('soban').value;
  const hue     = document.getElementById('hue').value;
  const val     = document.getElementById('value_').value;
  const chr     = document.getElementById('chroma').value;
  const doshu   = document.getElementById('doshu').value;
  const shimari = document.getElementById('shimari').value;
  const nendo   = document.getElementById('nendo').value;
  const seikaku = document.getElementById('seikaku').value.trim();

  // 遺構コード
  const code = ikoType && ikoNum ? `${ikoType}${ikoNum}` : '-';
  document.getElementById('prev_code').textContent = code;

  // 色コード
  const colorCode = hue && val && chr ? (hue === 'N' ? `N${val}/` : `${hue}${val}/${chr}`) : '-';
  document.getElementById('prev_colorcode').textContent = colorCode;

  // 土色名
  const colorName = getColorName(hue, val, chr);
  const swatch = document.getElementById('prev_swatch');
  if (swatch) {
    const hex = (hue && val && (chr || hue==='N')) ? (hue==='N' ? (COLOR_HEX['N'+val+'/0']||COLOR_HEX['N'+val+'/']) : COLOR_HEX[hue+val+'/'+chr]) : null;
    swatch.style.background = (typeof _mute==='function'? _mute(hex,hue,chr): hex) || 'transparent';
  }
  const prevColor = document.getElementById('prev_color');
  if (colorName) {
    prevColor.textContent = colorName;
    prevColor.className = 'preview-val auto';
  } else if (hue && val && chr) {
    prevColor.textContent = '※マスタ未登録';
    prevColor.className = 'preview-val empty';
  } else {
    prevColor.textContent = '-';
    prevColor.className = 'preview-val';
  }

  // 混入物記載文
  const konnyuText = buildKonnyuText();
  document.getElementById('prev_konnyu').textContent = konnyuText || '（混入物なし）';

  // 全体記載文
  let parts = [];
  if (colorCode !== '-' && colorName) parts.push(`${colorCode}（${colorName}）`);
  if (doshu) parts.push(doshu);
  if (shimari) parts.push(`締り${shimari}`);
  if (nendo) parts.push(`粘性${nendo}`);
  if (konnyuText) parts.push(konnyuText);
  if (seikaku) parts.push(seikaku);
  const allText = parts.join('。');
  document.getElementById('prev_all').textContent = allText || '（入力中）';
  if (typeof syncColorButtons === 'function') syncColorButtons();
  if (typeof syncInputUI === 'function') syncInputUI();
}

// ===== 混入物 =====
function addKonnyu(data) {
  const id = ++konnyuCounter;
  const div = document.createElement('div');
  div.className = 'konkyu-item';
  div.id = `konnyu_${id}`;

  const typeOpts = MASTERS.konnyuType.map(v => `<option value="${v}" ${data&&data.type===v?'selected':''}>${v}</option>`).join('');

function getKonnyuData() {
  const items = document.querySelectorAll('.konkyu-item');
  return Array.from(items).map(item => {
    const sels = item.querySelectorAll('select');
    return {
      type: sels[0].value,
      kata: sels[1].value,
      mmMin: sels[2].value,
      mmMax: sels[3].value,
      unit: sels[4].value,
      ryo: sels[5].value,
      iri: sels[6].value
    };
  });
}

function buildKonnyuText() {
  const data = getKonnyuData();
  if (!data.length) return '';
  return data.map(d => {
    let s = d.type;
    if (d.kata) s += `（${d.kata}）`;
    if (d.mmMin && d.mmMax) {
      const a = Math.min(Number(d.mmMin)||0, Number(d.mmMax)||0);
      const b = Math.max(Number(d.mmMin)||0, Number(d.mmMax)||0);
      if (a === b) s += `（φ${a}${d.unit}）`;
      else s += `（φ${a}〜${b}${d.unit}）`;
    } else if (d.mmMin) {
      s += `（φ${d.mmMin}${d.unit}）`;
    }
    if (d.ryo) s += `を${d.ryo}`;
    if (d.iri) s += `・${d.iri}`;
    s += '含む';
    return s;
  }).join('、');
}

function collectForm() {
  const hue = document.getElementById('hue').value;
  const val = document.getElementById('value_').value;
  const chr = document.getElementById('chroma').value;
  const colorCode = hue && val && chr ? (hue==='N' ? `N${val}/` : `${hue}${val}/${chr}`) : '';
  const colorName = getColorName(hue, val, chr) || '';
  const konnyuData = getKonnyuData();
  const konnyuText = buildKonnyuText();

  const doshu   = document.getElementById('doshu').value;
  const shimari = document.getElementById('shimari').value;
  const nendo   = document.getElementById('nendo').value;
  const seikaku = document.getElementById('seikaku').value.trim();

  let allParts = [];
  if (colorCode && colorName) allParts.push(`${colorCode}（${colorName}）`);
  if (doshu)   allParts.push(doshu);
  if (shimari) allParts.push(`締り${shimari}`);
  if (nendo)   allParts.push(`粘性${nendo}`);
  if (konnyuText) allParts.push(konnyuText);
  if (seikaku) allParts.push(seikaku);

  return {
    ikoType: document.getElementById('ikoType').value,
    ikoNum:  document.getElementById('ikoNum').value.trim(),
    futai:   document.getElementById('futai').value.trim(),
    spl:     document.getElementById('spl').value,
    soban:   document.getElementById('soban').value,
    hue, value: val, chroma: chr,
    colorCode, colorName,
    doshu, shimari, nendo, seikaku,
    konnyuData,
    konnyuText,
    biko: document.getElementById('biko').value.trim(),
    allText: allParts.join('。')
  };
}

// ===== 自動保存 =====
// ===== IndexedDB =====
const IDB_NAME    = 'dosodaicho';
const IDB_VERSION = 1;
const IDB_STORE   = 'data';
let idb = null;

function openIDB() {
  return new Promise((resolve, reject) => {
    if (idb) { resolve(idb); return; }
    const req = indexedDB.open(IDB_NAME, IDB_VERSION);
    req.onupgradeneeded = e => {
      e.target.result.createObjectStore(IDB_STORE);
    };
    req.onsuccess = e => { idb = e.target.result; resolve(idb); };
    req.onerror   = e => reject(e.target.error);
  });
}

function idbSet(key, value) {
  return openIDB().then(db => new Promise((resolve, reject) => {
    const tx  = db.transaction(IDB_STORE, 'readwrite');
    const req = tx.objectStore(IDB_STORE).put(value, key);
    req.onsuccess = () => resolve();
    req.onerror   = e => reject(e.target.error);
  }));
}

function idbGet(key) {
  return openIDB().then(db => new Promise((resolve, reject) => {
    const req = db.transaction(IDB_STORE, 'readonly').objectStore(IDB_STORE).get(key);
    req.onsuccess = e => resolve(e.target.result);
    req.onerror   = e => reject(e.target.error);
  }));
}

function idbDelete(key) {
  return openIDB().then(db => new Promise((resolve, reject) => {
    const req = db.transaction(IDB_STORE, 'readwrite').objectStore(IDB_STORE).delete(key);
    req.onsuccess = () => resolve();
    req.onerror   = e => reject(e.target.error);
  }));
}

function idbClear() {
  return openIDB().then(db => new Promise((resolve, reject) => {
    const req = db.transaction(IDB_STORE, 'readwrite').objectStore(IDB_STORE).clear();
    req.onsuccess = () => resolve();
    req.onerror   = e => reject(e.target.error);
  }));
}

async function autoSave() {
  try {
    const genba = document.getElementById('genbaName')?.value?.trim() || '';
    const page  = document.getElementById('pageNum')?.value || '';
    const now   = new Date();
    const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
    await Promise.all([
      idbSet('dosoRecords',      records),
      idbSet('dosoPhotos',       groupPhotos),
      idbSet('dosoAutoSaveTime', timeStr),
      genba ? idbSet('dosoGenbaName', genba) : Promise.resolve(),
      page  ? idbSet('dosoPageNum',  page)  : Promise.resolve(),
    ]);
    const el = document.getElementById('autoSaveStatus');
    if (el) {
      el.textContent = `✅ 自動保存：${timeStr}`;
      el.style.color = '#7dff9e';
      setTimeout(() => { el.style.color = '#aad'; }, 2000);
    }
  } catch(e) {
    const el = document.getElementById('autoSaveStatus');
    if (el) { el.textContent = '⚠️ 自動保存失敗'; el.style.color = '#ffaa44'; }
  }
}

// ===== 一覧レンダリング（アコーディオン） =====
// 開閉状態を記憶
const openGroups = new Set();
const openSubGroups = new Set(); // 付帯施設サブアコーディオン

// 写真データ: キー = 遺構コード or 遺構コード__付帯施設名
const groupPhotos = {};

function renderList() {
  const container = document.getElementById('groupedList');
  container.innerHTML = '';

  if (!records.length) {
    container.innerHTML = '<p style="color:#888;text-align:center;margin-top:20px">データがありません。</p>';
    document.getElementById('listCount').textContent = '0件';
    document.getElementById('countBadge').textContent = '0';
    return;
  }

  // 遺構コード＋付帯施設 を1単位としてフラットにグループ化（付帯施設はツリーにしない）
  const units = {};
  records.forEach((r, i) => {
    const code = `${r.ikoType}${(r.ikoNum||'').padStart(2,'0')}`;
    const futai = (r.futai || '').trim();
    const key = futai ? `${code}__${futai}` : code;
    const label = `${code}${futai}`;
    if (!units[key]) units[key] = { label, items: [] };
    units[key].items.push({ r, i });
  });

  Object.keys(units).sort((a,b) => units[a].label.localeCompare(units[b].label, 'ja')).forEach(key => {
    const u = units[key];
    u.items.sort((a,b) => (parseInt(a.r.soban)||0) - (parseInt(b.r.soban)||0));
    const isOpen = openGroups.has(key);
    const photos = groupPhotos[key] || [];
    const photoCount = photos.length ? `📷${photos.length}枚` : '';

    const header = document.createElement('div');
    header.className = 'group-header';
    header.innerHTML = `
      <div>
        <span class="group-title">📂 ${u.label}</span>
        <span class="group-meta">${u.items.length}層 ${photoCount}</span>
      </div>
      <span class="group-arrow ${isOpen ? 'open' : ''}">▶</span>
    `;
    header.addEventListener('click', () => toggleGroup(key));

    const body = document.createElement('div');
    body.className = `group-body ${isOpen ? 'open' : ''}`;
    body.id = `group_${key}`;
    body.appendChild(makeLayerTable(u.items));
    body.appendChild(makePhotoArea(key, photos));

    container.appendChild(header);
    container.appendChild(body);
  });

  document.getElementById('listCount').textContent = `${records.length}件`;
  document.getElementById('countBadge').textContent = records.length;
}

function makeLayerTable(items) {
  const wrap = document.createElement('div');
  wrap.className = 'list-table-wrap';
  const table = document.createElement('table');
  table.innerHTML = `
    <thead>
      <tr>
        <th>層番</th><th>色コード</th><th>土色</th><th>土種</th>
        <th>締り</th><th>粘性</th><th>混入物（概要）</th><th>操作</th>
      </tr>
    </thead>
  `;
  const tbody = document.createElement('tbody');
  items.sort((a, b) => (parseInt(a.r.soban)||0) - (parseInt(b.r.soban)||0));
  items.forEach(({ r, i }) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="font-weight:bold">${r.soban}</td>
      <td>${r.colorCode||''}</td>
      <td>${r.colorName||''}</td>
      <td>${r.doshu||''}</td>
      <td>${r.shimari||''}</td>
      <td>${r.nendo||''}</td>
      <td style="max-width:180px;font-size:12px">${r.konnyuText||''}</td>
      <td>
        <button class="edit-btn" onclick="editRecord(${i})">編集</button>
        <button class="del-btn" onclick="deleteRecord(${i})">削除</button>
      </td>
    `;
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  wrap.appendChild(table);
  return wrap;
}

function makePhotoArea(photoKey, photos) {
  const photoArea = document.createElement('div');
  photoArea.className = 'photo-area';
  photoArea.innerHTML = `<div class="photo-area-title">📷 メモ写真</div>`;
  const grid = document.createElement('div');
  grid.className = 'photo-grid';
  grid.id = `photoGrid_${photoKey}`;
  photos.forEach(p => grid.appendChild(makePhotoCard(photoKey, p)));
  photoArea.appendChild(grid);
  const btnWrap = document.createElement('div');
  btnWrap.className = 'photo-add-btns';
  const camBtn = document.createElement('button');
  camBtn.className = 'photo-add-btn';
  camBtn.textContent = '📷 カメラ撮影';
  camBtn.addEventListener('click', () => triggerPhotoInput(photoKey, 'camera'));
  const libBtn = document.createElement('button');
  libBtn.className = 'photo-add-btn';
  libBtn.textContent = '🖼 ライブラリから選択';
  libBtn.addEventListener('click', () => triggerPhotoInput(photoKey, 'library'));
  btnWrap.appendChild(camBtn);
  btnWrap.appendChild(libBtn);
  photoArea.appendChild(btnWrap);
  const camInput = document.createElement('input');
  camInput.type='file'; camInput.accept='image/*'; camInput.capture='environment';
  camInput.multiple=true; camInput.className='photo-input';
  camInput.id=`photoCamInput_${photoKey}`;
  camInput.addEventListener('change', e => handlePhotoInput(e, photoKey));
  photoArea.appendChild(camInput);
  const libInput = document.createElement('input');
  libInput.type='file'; libInput.accept='image/*'; libInput.multiple=true;
  libInput.className='photo-input'; libInput.id=`photoLibInput_${photoKey}`;
  libInput.addEventListener('change', e => handlePhotoInput(e, photoKey));
  photoArea.appendChild(libInput);
  return photoArea;
}

function toggleSubGroup(subKey) {
  const body = document.getElementById(`subGroup_${subKey}`);
  const arrow = document.getElementById(`subArrow_${subKey}`);
  if (!body) return;
  if (body.style.display === 'none') {
    body.style.display = 'block';
    if (arrow) arrow.textContent = '▼';
    openSubGroups.add(subKey);
  } else {
    body.style.display = 'none';
    if (arrow) arrow.textContent = '▶';
    openSubGroups.delete(subKey);
  }
}

function makePhotoCard(code, p) {
  const card = document.createElement('div');
  card.className = 'photo-card';
  card.id = `photo_${p.id}`;
  card.innerHTML = `
    <img src="${p.dataUrl}" alt="${p.caption||''}">
    <div class="photo-caption" title="${p.caption||''}">${p.caption||'（メモなし）'}</div>
    <button class="photo-del" onclick="deletePhoto('${code}','${p.id}')">✕</button>
    <button class="photo-edit-btn" onclick="openDrawModal('${code}','${p.id}')">✏️</button>
  `;
  card.querySelector('img').addEventListener('click', () => editCaption(code, p.id));
  return card;
}

function triggerPhotoInput(code, type) {
  const id = type === 'camera' ? `photoCamInput_${code}` : `photoLibInput_${code}`;
  const input = document.getElementById(id);
  if (input) input.click();
}

function handlePhotoInput(e, code, openDrawAfter) {
  const files = Array.from(e.target.files);
  if (!files.length) return;
  if (!groupPhotos[code]) groupPhotos[code] = [];
  let loaded = 0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      const id = `p_${Date.now()}_${Math.random().toString(36).slice(2,6)}`;
      const caption = openDrawAfter ? '' : (prompt(`写真「${file.name}」のメモを入力してください（スキップ可）:`) || '');
      groupPhotos[code].push({ id, dataUrl: ev.target.result, caption });
      loaded++;
      if (loaded === files.length) {
        renderList();
        autoSave();
        if (typeof ifSetSelectedPhoto === 'function' && typeof ifCurrentCode === 'function' && code === ifCurrentCode() && groupPhotos[code].length) {
          ifSetSelectedPhoto(groupPhotos[code][groupPhotos[code].length-1].id);
        }
        if (typeof refreshPhotoPanel === 'function') refreshPhotoPanel();
        // 開いていたグループを再度開く
        openGroups.forEach(c => {
          const b = document.getElementById(`group_${c}`);
          const arr = document.querySelector(`#group_${c}`)?.previousElementSibling?.querySelector('.group-arrow');
          if (b) { b.classList.add('open'); }
          if (arr) arr.classList.add('open');
        });
        // 撮影直後はそのまま手書きへ
        if (openDrawAfter && typeof openDrawModal === 'function' && groupPhotos[code].length) {
          const newest = groupPhotos[code][groupPhotos[code].length-1];
          setTimeout(() => openDrawModal(code, newest.id), 60);
        }
      }
    };
    reader.readAsDataURL(file);
  });
  e.target.value = '';
}

function deletePhoto(code, id) {
  if (!confirm('この写真を削除しますか？')) return;
  if (groupPhotos[code]) {
    groupPhotos[code] = groupPhotos[code].filter(p => p.id !== id);
  }
  renderList();
  autoSave();
  if (typeof refreshPhotoPanel === 'function') refreshPhotoPanel();
}

function editCaption(code, id) {
  const photos = groupPhotos[code] || [];
  const p = photos.find(p => p.id === id);
  if (!p) return;
  const newCaption = prompt('メモを編集:', p.caption || '');
  if (newCaption === null) return;
  p.caption = newCaption;
  renderList();
  autoSave();
}

function toggleGroup(code) {
  const body = document.getElementById(`group_${code}`);
  if (!body) return;
  const header = body.previousElementSibling;
  const arrow = header?.querySelector('.group-arrow');
  if (body.classList.contains('open')) {
    body.classList.remove('open');
    if (arrow) arrow.classList.remove('open');
    openGroups.delete(code);
  } else {
    body.classList.add('open');
    if (arrow) arrow.classList.add('open');
    openGroups.add(code);
  }
}

function updateBadge() {
  document.getElementById('countBadge').textContent = records.length;
}

// ===== タブ切替 =====
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    const names = ['input','list','settings'];
    t.classList.toggle('active', names[i] === name);
  });
  document.querySelectorAll('.panel').forEach(p => {
    p.classList.toggle('active', p.id === `panel-${name}`);
  });
  if (name === 'list') renderList();
}

// ===== CSV出力 =====
function exportCSV() {
  if (!records.length) { alert('データがありません。'); return; }
  const headers = ['遺構種別','遺構番号','SPL','層番','Hue','Value','Chroma','色コード','土色','土種','締り','粘性','性格','混入物記載文','備考','全体記載文'];
  const rows = records.map(r => [
    r.ikoType, r.ikoNum, r.spl, r.soban,
    r.hue, r.value, r.chroma, r.colorCode, r.colorName,
    r.doshu, r.shimari, r.nendo, r.seikaku,
    r.konnyuText, r.biko, r.allText
  ].map(v => `"${(v||'').replace(/"/g,'""')}"`));
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `土層台帳_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

    const ikoCode = `${r.ikoType||''}${(r.ikoNum||'').padStart(2,'0')}`;
    return [
      ikoCode,   // A: 遺構
      '',        // B: 空欄
      r.soban,   // C: 層番
      '',        // D: 色調（数式列）
      '',        // E: コード（数式列）
      r.hue,     // F: Hue
      r.value,   // G: Value
      r.chroma,  // H: Chroma
      r.doshu,   // I: 土種
      r.shimari, // J: 締り
      r.nendo,   // K: 粘性
      r.konnyuText, // L: 混入物記載文
      r.seikaku, // M: 性格
      r.biko,    // N: 備考
      '',        // O: 混入物データ（数式列）
      r.soban ? `第${r.soban}層　${r.allText||''}` : r.allText, // P: 全体記載文（層番付き）
    ].map(v => `"${(v||'').replace(/"/g,'""')}"`);
  });
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `土層台帳_フォーム貼付用_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

  const payload = { records, photos: groupPhotos, genbaName: genba, pageNum: page };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});

function loadJSON() { document.getElementById('jsonFileInput').click(); }
function loadJSONFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      // 旧形式（配列）と新形式（{records, photos}）に対応
      const newRecords = Array.isArray(data) ? data : (data.records || []);
      const newPhotos  = Array.isArray(data) ? {} : (data.photos || {});
      if (!Array.isArray(newRecords)) throw new Error();
      if (records.length && !confirm('現在のデータを置き換えますか？')) return;
      records.length = 0;
      newRecords.forEach(r => records.push(r));
      Object.keys(groupPhotos).forEach(k => delete groupPhotos[k]);
      Object.assign(groupPhotos, newPhotos);
      // 現場名・ページ数を復元
      if (data.genbaName) {
        const el = document.getElementById('genbaName');
        if (el) el.value = data.genbaName;
        idbSet('dosoGenbaName', data.genbaName);
      }
      if (data.pageNum) {
        const el = document.getElementById('pageNum');
        if (el) el.value = data.pageNum;
        idbSet('dosoPageNum', data.pageNum);
      }
      renderList();
      updateBadge();
      alert(`${records.length}件を読み込みました。`);
    } catch { alert('JSONの読み込みに失敗しました。'); }
  };
  r.readAsText(file);
  e.target.value = '';
}

// ===== マスタ編集UI =====
function buildMasterEditor() {
  const container = document.getElementById('masterEditor');
  // 入力の項目順に対応
  const groups = [
    { label:'遺構種別',        key:'ikoType' },
    { label:'付帯施設',        key:'futaiList' },
    { label:'土種',            key:'doshu' },
    { label:'締り',            key:'shimari' },
    { label:'粘性',            key:'nendo' },
    { label:'混入物 種類',     key:'konnyuType' },
    { label:'混入物 形状',     key:'konnyuKata' },
    { label:'混入物 粒径(mm)', key:'konnyuMm' },
    { label:'混入物 量',       key:'konnyuRyo' },
    { label:'混入物 含み方',   key:'konnyuIri' },
  ];
  const em = s => String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const eq = s => String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  container.innerHTML = groups.map(g => `
    <div class="master-group">
      <div class="master-glabel">${g.label}</div>
      <div class="master-chips">
        ${(MASTERS[g.key]||[]).filter(v=>v!=='').map(v=>`<span class="master-chip">${em(v)}<button title="削除" onclick="removeMaster('${eq(g.key)}','${eq(v)}')">✕</button></span>`).join('') || '<span style="color:#aaa;font-size:12px">（項目なし）</span>'}
      </div>
      <div class="master-add">
        <input type="text" id="add_${g.key}" placeholder="追加する値">
        <button class="btn btn-blue" onclick="addMaster('${eq(g.key)}')">追加</button>
      </div>
    </div>
  `).join('');
}

function addMaster(key) {
  const input = document.getElementById(`add_${key}`);
  const val = input.value.trim();
  if (!val) return;
  if (!MASTERS[key].includes(val)) {
    MASTERS[key].push(val);
    try {
      const saved = JSON.parse(localStorage.getItem('dosoMasters') || '{}');
      if (!saved[key]) saved[key] = [];
      if (!saved[key].includes(val)) saved[key].push(val);
      localStorage.setItem('dosoMasters', JSON.stringify(saved));
      // 削除リストに入っていれば解除
      const del = JSON.parse(localStorage.getItem('dosoMastersDel') || '{}');
      if (del[key] && del[key].includes(val)) {
        del[key] = del[key].filter(v => v !== val);
        localStorage.setItem('dosoMastersDel', JSON.stringify(del));
      }
    } catch(e) {}
    buildSelects();
    buildMasterEditor();
    if (typeof syncInputUI === 'function') syncInputUI();
  } else {
    alert('すでに存在します。');
  }
  input.value = '';
}

function removeMaster(key, val) {
  if (!confirm(`「${val}」を削除しますか？`)) return;
  MASTERS[key] = MASTERS[key].filter(v => v !== val);
  try {
    // 追加リストから除去
    const saved = JSON.parse(localStorage.getItem('dosoMasters') || '{}');
    if (saved[key]) { saved[key] = saved[key].filter(v => v !== val); localStorage.setItem('dosoMasters', JSON.stringify(saved)); }
    // 削除リストに記録（既定項目でも復活しないように）
    const del = JSON.parse(localStorage.getItem('dosoMastersDel') || '{}');
    if (!del[key]) del[key] = [];
    if (!del[key].includes(val)) del[key].push(val);
    localStorage.setItem('dosoMastersDel', JSON.stringify(del));
  } catch(e) {}
  buildSelects();
  buildMasterEditor();
  if (typeof syncInputUI === 'function') syncInputUI();
}

// ===== 写真台帳出力 =====
function openLedger() {
  if (!records.length) { alert('データがありません。'); return; }

  // 遺構コードごとにグループ化
  const groups = {};
  records.forEach(r => {
    const code = `${r.ikoType}${(r.ikoNum||'').padStart(2,'0')}`;
    if (!groups[code]) groups[code] = [];
    groups[code].push(r);
  });

  const body = document.getElementById('ledgerBody');
  body.innerHTML = '';

  Object.keys(groups).sort().forEach(code => {
    const allItems = groups[code];

    // 付帯施設ごとにサブグループ化
    const subGroups = {};
    allItems.forEach(r => {
      const futai = r.futai || '';
      if (!subGroups[futai]) subGroups[futai] = [];
      subGroups[futai].push(r);
    });

    const subKeys = Object.keys(subGroups).sort((a,b) => {
      if (a==='') return -1; if (b==='') return 1;
      return a.localeCompare(b);
    });

    subKeys.forEach(futai => {
      const items = subGroups[futai].sort((a,b) => (parseInt(a.soban)||0)-(parseInt(b.soban)||0));
      const photoKey = futai ? `${code}__${futai}` : code;
      const photos = groupPhotos[photoKey] || [];

      const page = document.createElement('div');
      page.className = 'ledger-page';

      // タイトル
      const title = document.createElement('div');
      title.className = 'ledger-page-title';
      title.textContent = futai ? `遺構 ${code}　付帯施設：${futai}　土層台帳` : `遺構 ${code}　土層台帳`;
      page.appendChild(title);

      // 写真エリア（上）
      if (photos.length) {
        const photoWrap = document.createElement('div');
        photoWrap.className = 'ledger-photos';
        const imgSize = photos.length <= 3 ? 200 : photos.length <= 6 ? 150 : 110;
        photos.forEach(p => {
          const item = document.createElement('div');
          item.className = 'ledger-photo-item';
          item.innerHTML = `
            <img src="${p.dataUrl}" width="${imgSize}" height="${Math.round(imgSize*0.75)}" alt="">
            <div class="ledger-photo-cap">${p.caption||''}</div>
          `;
          photoWrap.appendChild(item);
        });
        page.appendChild(photoWrap);
      } else {
        const noPhoto = document.createElement('div');
        noPhoto.className = 'ledger-no-photo';
        noPhoto.textContent = '（写真なし）';
        page.appendChild(noPhoto);
      }

      const hr = document.createElement('hr');
      hr.style.cssText = 'border:none;border-top:1px solid #ccc;margin:10px 0';
      page.appendChild(hr);

      // 土層テーブル（下）
      const table = document.createElement('table');
      table.className = 'ledger-table';
      table.innerHTML = `
        <thead>
          <tr>
            <th style="width:40px">層番</th>
            <th style="width:70px">色コード</th>
            <th style="width:70px">土色</th>
            <th style="width:50px">土種</th>
            <th style="width:60px">締り</th>
            <th style="width:60px">粘性</th>
            <th>混入物</th>
            <th style="width:80px">性格</th>
            <th style="width:80px">備考</th>
          </tr>
        </thead>
      `;
      const tbody = document.createElement('tbody');
      items.forEach(r => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td style="text-align:center;font-weight:bold">${r.soban||''}</td>
          <td>${r.colorCode||''}</td>
          <td>${r.colorName||''}</td>
          <td>${r.doshu||''}</td>
          <td>${r.shimari||''}</td>
          <td>${r.nendo||''}</td>
          <td style="font-size:10px">${r.konnyuText||''}</td>
          <td>${r.seikaku||''}</td>
          <td style="font-size:10px">${r.biko||''}</td>
        `;
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      page.appendChild(table);
      body.appendChild(page);
    });
  });

  document.getElementById('ledgerModal').classList.add('open');
}

function closeLedger() {
  document.getElementById('ledgerModal').classList.remove('open');
}

<script>
// ===== 手書き機能 =====
let drawCtx = null;
let drawCanvas = null;
let isDrawing = false;
let drawMode = 'pen';
let drawHistory = [];
let currentDrawCode = null;
let currentDrawPhotoId = null;

function initCanvas(imgSrc) {
  drawCanvas = document.getElementById('drawCanvas');
  drawCtx = drawCanvas.getContext('2d');
  const bg = document.getElementById('drawBgCanvas');
  const bgCtx = bg.getContext('2d');
  const img = new Image();
  img.onload = () => {
    // iPadの画面サイズに合わせる
    const maxW = window.innerWidth;
    const maxH = window.innerHeight - 120;
    const scale = Math.min(maxW / img.width, maxH / img.height, 1);
    const w = img.width * scale, h = img.height * scale;
    bg.width = w; bg.height = h;
    drawCanvas.width = w; drawCanvas.height = h;
    // 背景＝写真（触らない）／前面＝透明な手書きレイヤー
    bgCtx.clearRect(0, 0, w, h);
    bgCtx.drawImage(img, 0, 0, w, h);
    drawCtx.clearRect(0, 0, w, h);
    drawHistory = [drawCtx.getImageData(0, 0, w, h)];
  };
  img.src = imgSrc;
}

function openDrawModal(code, photoId) {
  const photos = groupPhotos[code] || [];
  const p = photos.find(p => p.id === photoId);
  if (!p) return;
  currentDrawCode = code;
  currentDrawPhotoId = photoId;
  document.getElementById('drawModal').classList.add('open');
  setDrawMode('pen');
  initCanvas(p.dataUrl);
  setupDrawEvents();
}

function closeDrawModal() {
  document.getElementById('drawModal').classList.remove('open');
  removeDrawEvents();
}

function setDrawMode(mode) {
  drawMode = mode;
  document.getElementById('btnPen').className    = mode === 'pen'    ? 'btn btn-blue' : 'btn btn-gray';
  document.getElementById('btnEraser').className = mode === 'eraser' ? 'btn btn-blue' : 'btn btn-gray';
  document.getElementById('btnPen').style.padding = '5px 10px';
  document.getElementById('btnEraser').style.padding = '5px 10px';
  document.getElementById('btnPen').style.fontSize = '13px';
  document.getElementById('btnEraser').style.fontSize = '13px';
}

function undoDraw() {
  if (drawHistory.length <= 1) return;
  drawHistory.pop();
  drawCtx.putImageData(drawHistory[drawHistory.length - 1], 0, 0);
}

function clearDraw() {
  if (drawHistory.length > 0) {
    drawCtx.putImageData(drawHistory[0], 0, 0);
    drawHistory = [drawHistory[0]];
  }
}

function getPos(e, canvas) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width  / rect.width;
  const scaleY = canvas.height / rect.height;
  const src = e.touches ? e.touches[0] : e;
  return {
    x: (src.clientX - rect.left) * scaleX,
    y: (src.clientY - rect.top)  * scaleY
  };
}

function onDrawStart(e) {
  e.preventDefault();
  isDrawing = true;
  const pos = getPos(e, drawCanvas);
  drawCtx.beginPath();
  drawCtx.moveTo(pos.x, pos.y);
}

function onDrawMove(e) {
  e.preventDefault();
  if (!isDrawing) return;
  const pos = getPos(e, drawCanvas);
  const size = parseInt(document.getElementById('drawSize').value);
  const color = document.getElementById('drawColor').value;
  if (drawMode === 'eraser') {
    drawCtx.globalCompositeOperation = 'destination-out';
    drawCtx.lineWidth = size * 3;
    drawCtx.strokeStyle = 'rgba(0,0,0,1)';
  } else {
    drawCtx.globalCompositeOperation = 'source-over';
    drawCtx.lineWidth = size;
    drawCtx.strokeStyle = color;
  }
  drawCtx.lineCap = 'round';
  drawCtx.lineJoin = 'round';
  drawCtx.lineTo(pos.x, pos.y);
  drawCtx.stroke();
}

function onDrawEnd(e) {
  if (!isDrawing) return;
  isDrawing = false;
  drawCtx.globalCompositeOperation = 'source-over';
  drawHistory.push(drawCtx.getImageData(0, 0, drawCanvas.width, drawCanvas.height));
}

function setupDrawEvents() {
  const c = document.getElementById('drawCanvas');
  c.addEventListener('mousedown',  onDrawStart);
  c.addEventListener('mousemove',  onDrawMove);
  c.addEventListener('mouseup',    onDrawEnd);
  c.addEventListener('touchstart', onDrawStart, {passive:false});
  c.addEventListener('touchmove',  onDrawMove,  {passive:false});
  c.addEventListener('touchend',   onDrawEnd);
}

function removeDrawEvents() {
  const c = document.getElementById('drawCanvas');
  c.removeEventListener('mousedown',  onDrawStart);
  c.removeEventListener('mousemove',  onDrawMove);
  c.removeEventListener('mouseup',    onDrawEnd);
  c.removeEventListener('touchstart', onDrawStart);
  c.removeEventListener('touchmove',  onDrawMove);
  c.removeEventListener('touchend',   onDrawEnd);
}

function saveDrawing() {
  const photos = groupPhotos[currentDrawCode];
  if (!photos) return;
  const p = photos.find(p => p.id === currentDrawPhotoId);
  if (!p) return;
  const bg = document.getElementById('drawBgCanvas');
  // 背景写真＋手書きレイヤーを合成
  const out = document.createElement('canvas');
  out.width = bg.width; out.height = bg.height;
  const octx = out.getContext('2d');
  octx.drawImage(bg, 0, 0);
  octx.drawImage(drawCanvas, 0, 0);
  const fullDataUrl = out.toDataURL('image/jpeg', 0.85);
  p.dataUrl = fullDataUrl;
  closeDrawModal();
  renderList();
  autoSave();
  if (typeof refreshPhotoPanel === 'function') refreshPhotoPanel();
}
</script>

const GDRIVE_CLIENT_ID = '871732626144-tvjim2fu9t26s8ta4m7kts1v35e30vke.apps.googleusercontent.com';

function getDriveToken() {

    const client = google.accounts.oauth2.initTokenClient({
      client_id: GDRIVE_CLIENT_ID,
      scope: GDRIVE_SCOPE,
      callback: (resp) => {
        if (resp.error) { reject(resp.error); return; }
        driveAccessToken = resp.access_token;
        resolve(driveAccessToken);
      }
    });
    client.requestAccessToken();

// ② フォルダIDを取得（なければ作成）
async function getOrCreateFolder(token, folderName) {
  const q = encodeURIComponent(`name='${folderName}' and mimeType='application/vnd.google-apps.folder' and trashed=false`);
  const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`, {
    headers: { Authorization: `Bearer ${token}` }
  });
  const data = await res.json();
  if (data.error) throw new Error(`フォルダ検索エラー: ${data.error.message}`);
  if (data.files && data.files.length > 0) return data.files[0].id;

  // なければ作成
  const create = await fetch('https://www.googleapis.com/drive/v3/files', {
    method: 'POST',
    headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: folderName, mimeType: 'application/vnd.google-apps.folder' })
  });
  const folder = await create.json();
  if (folder.error) throw new Error(`フォルダ作成エラー: ${folder.error.message}`);
  return folder.id;
}

// ③ 同名ファイルがあれば上書き、なければ新規作成
async function uploadToDrive(token, folderId, fileName, content) {
  const q = encodeURIComponent(`name='${fileName}' and '${folderId}' in parents and trashed=false`);
  const search = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id)`, {
    headers: { Authorization: `Bearer ${token}` }
  });
  const found = await search.json();
  if (found.error) throw new Error(`ファイル検索エラー: ${found.error.message}`);

  const blob = new Blob([content], { type: 'application/json' });

  if (found.files && found.files.length > 0) {
    // 上書き更新
    const form = new FormData();
    form.append('metadata', new Blob([JSON.stringify({ name: fileName })], { type: 'application/json' }));
    form.append('file', blob);
    const res = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${found.files[0].id}?uploadType=multipart`, {
      method: 'PATCH',
      headers: { Authorization: `Bearer ${token}` },
      body: form
    });
    const result = await res.json();
    if (result.error) throw new Error(`上書き保存エラー: ${result.error.message}`);
    return 'updated';
  } else {
    // 新規作成：multipartでmetadata+fileを送信
    const boundary = '-------314159265358979323846';
    const delimiter = `\r\n--${boundary}\r\n`;
    const closeDelim = `\r\n--${boundary}--`;
    const metaStr = JSON.stringify({ name: fileName, parents: [folderId] });
    const body =
      delimiter +
      'Content-Type: application/json; charset=UTF-8\r\n\r\n' +
      metaStr +
      delimiter +
      'Content-Type: application/json\r\n\r\n' +
      content +
      closeDelim;
    const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
      method: 'POST',
      headers: {
        Authorization: `Bearer ${token}`,
        'Content-Type': `multipart/related; boundary="${boundary}"`
      },
      body
    });
    const result = await res.json();
    if (result.error) throw new Error(`新規保存エラー: ${result.error.message}`);
    return 'created';
  }
}

// ④ メイン：Drive保存ボタンから呼び出す
async function saveToDrive() {
  if (!records.length) { alert('データがありません。'); return; }
  const btn = document.getElementById('driveBtn');
  btn.textContent = '☁️ 保存中…';
  btn.disabled = true;
  try {
    const token    = await getDriveToken();
    const folderId = await getOrCreateFolder(token, GDRIVE_FOLDER);
    const genba = document.getElementById('genbaName')?.value?.trim() || '';
    const page  = document.getElementById('pageNum')?.value || '';
    const parts = ['土層台帳'];
    if (genba) parts.push(genba);
    if (page)  parts.push(`p${page}`);
    parts.push(new Date().toISOString().slice(0,10));
    const fileName = parts.join('_') + '.json';
    const content  = JSON.stringify({ records, photos: groupPhotos, genbaName: genba, pageNum: page }, null, 2);
    const result   = await uploadToDrive(token, folderId, fileName, content);
    const msg = result === 'updated' ? `Google Drive「${GDRIVE_FOLDER}」フォルダの「${fileName}」を上書き保存しました。` : `Google Drive「${GDRIVE_FOLDER}」フォルダに「${fileName}」を保存しました。`;
    alert(msg);
    const el = document.getElementById('autoSaveStatus');
    if (el) {
      const now = new Date();
      el.textContent = `☁️ Drive保存：${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
      el.style.color = '#7dff9e';
      setTimeout(() => { el.style.color = '#aad'; }, 3000);
    }
  } catch(e) {
    alert(`Google Drive保存に失敗しました。\n${e}`);
    driveAccessToken = null;
  } finally {
    btn.textContent = '☁️ Drive保存';
    btn.disabled = false;
  }
}

// ⑤ Drive読込
async function loadFromDrive() {
  const btn = document.getElementById('driveLoadBtn');
  btn.textContent = '☁️ 読込中…'; btn.disabled = true;
  try {
    const token    = await getDriveToken();
    const folderId = await getOrCreateFolder(token, GDRIVE_FOLDER);
    // フォルダ内のJSONファイル一覧を取得
    const q = encodeURIComponent(`'${folderId}' in parents and mimeType='application/json' and trashed=false`);
    const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name,modifiedTime)&orderBy=modifiedTime desc`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    if (!data.files || data.files.length === 0) {
      alert(`Google Drive「${GDRIVE_FOLDER}」フォルダにJSONファイルがありません。`);
      return;
    }
    // モーダルに一覧を表示
    showDriveFileModal(token, data.files, 'doso');
  } catch(e) {
    alert(`Google Drive読込に失敗しました。\n${e}`);
    driveAccessToken = null;
  } finally {
    btn.textContent = '☁️ Drive読込'; btn.disabled = false;
  }
}

function showDriveFileModal(token, files, appType) {
  const existing = document.getElementById('driveFileModal');
  if (existing) existing.remove();
  const modal = document.createElement('div');
  modal.id = 'driveFileModal';
  modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;z-index:2000;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center';
  const box = document.createElement('div');
  box.style.cssText = 'background:#fff;border-radius:10px;padding:16px;width:90%;max-width:480px;max-height:70vh;display:flex;flex-direction:column;gap:10px';
  box.innerHTML = `
    <div style="font-weight:bold;font-size:15px;color:#2c5f8a">☁️ Google Driveからファイルを選択</div>
    <div style="font-size:12px;color:#888">「土層台帳」フォルダ内のJSONファイル</div>
    <div id="driveFileList" style="overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:6px"></div>
    <button onclick="document.getElementById('driveFileModal').remove()" style="background:#888;color:#fff;border:none;border-radius:5px;padding:10px;font-size:14px;cursor:pointer">キャンセル</button>
  `;
  const list = box.querySelector('#driveFileList');
  files.forEach(f => {
    const date = f.modifiedTime ? new Date(f.modifiedTime).toLocaleString('ja-JP') : '';
    const item = document.createElement('button');
    item.style.cssText = 'background:#f0f7ff;border:1px solid #c0d4e8;border-radius:6px;padding:10px 12px;text-align:left;cursor:pointer;font-size:13px';
    item.innerHTML = `<div style="font-weight:bold;color:#2c5f8a">${f.name}</div><div style="font-size:11px;color:#888;margin-top:2px">${date}</div>`;
    item.addEventListener('click', () => downloadDriveFile(token, f.id, f.name, appType));
    list.appendChild(item);
  });
  modal.appendChild(box);
  document.body.appendChild(modal);
}

async function downloadDriveFile(token, fileId, fileName, appType) {
  try {
    const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    const data = await res.json();
    const newRecords = Array.isArray(data) ? data : (data.records || []);
    const newPhotos  = Array.isArray(data) ? {} : (data.photos || {});
    if (!Array.isArray(newRecords)) throw new Error('不正なJSONフォーマット');
    if (records.length && !confirm(`「${fileName}」を読み込みます。現在のデータを置き換えますか？`)) return;
    records.length = 0;
    newRecords.forEach(r => records.push(r));
    Object.keys(groupPhotos).forEach(k => delete groupPhotos[k]);
    Object.assign(groupPhotos, newPhotos);
    if (data.genbaName) {
      const el = document.getElementById('genbaName');
      if (el) el.value = data.genbaName;
      idbSet('dosoGenbaName', data.genbaName);
    }
    if (data.pageNum) {
      const el = document.getElementById('pageNum');
      if (el) el.value = data.pageNum;
      idbSet('dosoPageNum', data.pageNum);
    }
    renderList(); updateBadge();
    document.getElementById('driveFileModal')?.remove();
    alert(`「${fileName}」を読み込みました（${newRecords.length}件）。`);
  } catch(e) {
    alert(`ファイル読込に失敗しました。\n${e}`);
  }
}
</script>

<!-- ===== 土色ピッカー モーダル ===== -->
<div class="color-modal" id="huePicker">
  <div class="color-modal-box">
    <div class="color-modal-bar"><span class="cm-title">Hue を選択</span><button class="cm-close" onclick="closeColorModal('huePicker')">閉じる</button></div>
    <div class="color-modal-body"><div class="hue-grid" id="hueGrid"></div></div>
  </div>
</div>
<div class="color-modal" id="vcPicker">
  <div class="color-modal-box">
    <div class="color-modal-bar"><span class="cm-title">Value / Chroma を選択</span><button class="cm-close" onclick="closeColorModal('vcPicker')">閉じる</button></div>
    <div class="color-modal-body">
      <div class="vc-hue-line" id="vcHueLine"></div>
      <div id="vcGridWrap"></div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
// 土色ピッカー（Hue モーダル ＋ Value/Chroma 格子モーダル）
//   値は従来どおり隠しselect #hue / #value_ / #chroma に格納。
//   保存・読込・リセットのロジックは一切変更なし。
// ═══════════════════════════════════════════════════
const MUNSELL_RE=/^([0-9.]*[A-Z]+)([0-9.]+)\/([0-9.]*)$/;
const HUE_INDEX={};
Object.entries(COLOR_MASTER).forEach(([code,name])=>{
  const m=code.match(MUNSELL_RE); if(!m)return;
  const h=m[1],v=m[2],c=m[3];
  if(!HUE_INDEX[h])HUE_INDEX[h]={vals:new Set(),chromas:new Set(),cells:{}};
  HUE_INDEX[h].vals.add(v);
  if(c!=='')HUE_INDEX[h].chromas.add(c);
  HUE_INDEX[h].cells[v+'|'+c]=name;
});
const HUE_ORDER=MASTERS.hue.filter(h=>h);
let vcChainAfterHue=false;

// 実色ヘルパー
// 土色帖のマット感に寄せる補正（色相・彩度対応）
//   MUTE_K    : 茶・黄・灰系のマット補正の強さ（0=土壌標準そのまま / 0.3=帖寄り）
//   RED_KEEP  : 赤系(R・YR系)はマットを弱める倍率（小さいほど赤を保持）
//   RED_BOOST : 赤系の赤みを強める（1=なし / 1.1前後で強調）
//   CHR_BRIGHT: 高彩度セルの明るさ持ち上げ（暗いセルほど強く効く／0=なし）
const MUTE_K = 0.30;
const RED_KEEP = 0.20;
const RED_BOOST = 1.12;
const CHR_BRIGHT = 0.30;
const RED_HUES = new Set(['7.5R','10R','2.5YR','5YR','5R']);
function _mute(hex,hue,chroma){
  if(!hex)return hex;
  const isRed=hue&&RED_HUES.has(hue);
  const k=isRed?MUTE_K*RED_KEEP:MUTE_K;
  let r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
  const y=0.299*r+0.587*g+0.114*b;
  if(isRed&&RED_BOOST!==1){r=y+(r-y)*RED_BOOST;g=y+(g-y)*RED_BOOST;b=y+(b-y)*RED_BOOST;}
  const lift=0.03;
  const bl=x=>Math.min(1,Math.max(0,(1-k)*x+k*y)*(1-lift)+lift);
  r=bl(r);g=bl(g);b=bl(b);
  const cf=parseFloat(chroma)||0;
  if(cf>0&&CHR_BRIGHT>0){
    const yy=0.299*r+0.587*g+0.114*b;
    const s=1+CHR_BRIGHT*Math.min(1,cf/8)*(1-yy);   // 彩度×暗さ（色相は保持）
    r=Math.min(1,r*s);g=Math.min(1,g*s);b=Math.min(1,b*s);
  }
  const hx=x=>Math.round(x*255).toString(16).padStart(2,'0');
  return '#'+hx(r)+hx(g)+hx(b);
}
function _hexLum(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return (0.299*r+0.587*g+0.114*b)/255}
function _txtOn(hex){return hex&&_hexLum(hex)>0.6?'#222':'#fff'}
function _hexFor(h,v,c){return h==='N'?(COLOR_HEX['N'+v+'/0']||COLOR_HEX['N'+v+'/']):COLOR_HEX[h+v+'/'+c]}
function _repHueHex(h){
  if(h==='N')return COLOR_HEX['N5/0']||COLOR_HEX['N5/']||'#888';
  const idx=HUE_INDEX[h];if(!idx)return '#ccc';
  let best='#ccc',score=-1;
  idx.vals.forEach(v=>idx.chromas.forEach(c=>{const hex=COLOR_HEX[h+v+'/'+c];if(hex){const s=parseFloat(c)-Math.abs(parseFloat(v)-5)*0.4;if(s>score){score=s;best=hex}}}));
  return best;
}

function _g(id){return document.getElementById(id)}
function openColorModal(id){_g(id).classList.add('open')}
function closeColorModal(id){_g(id).classList.remove('open')}
// selectに無い値でも確実に格納できるようにoptionを補う
function _setSel(id,val){const el=_g(id);if(val!==''&&![...el.options].some(o=>o.value===val)){const o=document.createElement('option');o.value=val;o.textContent=val;el.appendChild(o)}el.value=val}

function syncColorButtons(){
  const h=_g('hue').value,v=_g('value_').value,c=_g('chroma').value;
  _g('hueBtn').textContent=h||'選択…';
  let vc='選択…';
  if(h==='N') vc=v?`${v}/`:'選択…';
  else if(v&&c) vc=`${v}/${c}`;
  else if(v||c) vc=`${v||'?'}/${c||'?'}`;
  _g('vcBtn').textContent=vc;
}

function openHuePicker(){
  const cur=_g('hue').value;
  _g('hueGrid').innerHTML=HUE_ORDER.map(h=>{const rep=_mute(_repHueHex(h),h,6);const sel=h===cur?';outline:3px solid #e67e22;outline-offset:-3px':'';return `<button type="button" class="hue-cell${h===cur?' sel':''}" style="background:${rep};color:${_txtOn(rep)}${sel}" onclick="pickHue('${h}')">${h}</button>`}).join('');
  openColorModal('huePicker');
}
function pickHue(h){
  _setSel('hue',h);
  if(h==='N') _setSel('chroma','');
  updateColor();
  closeColorModal('huePicker');
  if(vcChainAfterHue){vcChainAfterHue=false;openVCPicker()}
}

function openVCPicker(){
  const h=_g('hue').value;
  if(!h){vcChainAfterHue=true;openHuePicker();return}
  const idx=HUE_INDEX[h];
  _g('vcHueLine').innerHTML=`Hue: <b>${h}</b> <button type="button" onclick="openHuePicker()">Hueを変更</button>`;
  const curV=_g('value_').value,curC=_g('chroma').value;
  const vals=[...(idx?idx.vals:[])].sort((a,b)=>parseFloat(b)-parseFloat(a)); // 明→暗（上→下）
  const wrap=_g('vcGridWrap');
  if(h==='N'){
    wrap.innerHTML=`<table class="vc-grid"><thead><tr><th style="width:80px">Value</th><th>土色名</th></tr></thead><tbody>`+
      vals.map(v=>{const name=idx.cells[v+'|']||idx.cells[v+'|0']||'';const sel=(v===curV)?' sel':'';const hex=_mute(_hexFor('N',v,''),'N')||'#fff';
        return `<tr><td style="background:${hex}"><button type="button" class="vc-cell${sel}" style="color:${_txtOn(hex)}" onclick="pickVC('${v}','')"><span class="vc-code" style="color:inherit">${v}/</span></button></td><td style="text-align:left;padding:4px 10px;font-size:12px;color:#456">${name}</td></tr>`}).join('')+
      `</tbody></table>`;
  }else{
    const chromas=[...(idx?idx.chromas:[])].sort((a,b)=>parseFloat(a)-parseFloat(b)); // 低→高（左→右）
    const head=`<tr><th>V＼C</th>`+chromas.map(c=>`<th>${c}</th>`).join('')+`</tr>`;
    const rows=vals.map(v=>{
      const tds=chromas.map(c=>{
        const name=idx.cells[v+'|'+c];
        if(!name)return `<td class="vc-empty"></td>`;
        const sel=(v===curV&&c===curC)?' sel':'';const hex=_mute(_hexFor(h,v,c),h,c)||'#eee';
        return `<td style="background:${hex}"><button type="button" class="vc-cell${sel}" style="color:${_txtOn(hex)}" onclick="pickVC('${v}','${c}')"><span class="vc-code" style="color:inherit">${v}/${c}</span><span class="vc-name" style="color:inherit;opacity:.85">${name}</span></button></td>`;
      }).join('');
      return `<tr><th>${v}</th>${tds}</tr>`;
    }).join('');
    wrap.innerHTML=`<table class="vc-grid"><thead>${head}</thead><tbody>${rows}</tbody></table>`;
  }
  openColorModal('vcPicker');
}
function pickVC(v,c){_setSel('value_',v);_setSel('chroma',c);updateColor();closeColorModal('vcPicker')}

// 背景タップで閉じる
['huePicker','vcPicker'].forEach(id=>{const m=_g(id);if(m)m.addEventListener('click',e=>{if(e.target===m)closeColorModal(id)})});
// 初期ラベル同期
syncColorButtons();
</script>

<script>
// ═══════════════════════════════════════════════════
// 新入力UI：スロット→ワークスペース
//   既存の項目要素(#ikoType 等)・混入物リスト・updatePreview をそのまま利用。
//   スロットは現在値を表示、ワークスペースで編集→DOMへ反映→updatePreviewで全体同期。
// ═══════════════════════════════════════════════════
const IF={
  ikoType:{label:'遺構種別',type:'list',master:'ikoType',dom:'ikoType',span:2},

let ifActive='ikoType';
let knEdit=null; // 編集中セル {id, key}
const KN_FIELDS=[
  {key:'type', label:'種類', idx:0},
  {key:'kata', label:'形状', idx:1},
  {key:'mmMin',label:'最小', idx:2},

];
function knMaster(key){
  if(key==='type')return MASTERS.konnyuType;
  if(key==='kata')return ['',...MASTERS.konnyuKata];

  if(key==='ryo')return MASTERS.konnyuRyo;

const _d=id=>document.getElementById(id);
const _esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function ifVal(key){
  if(key==='hue')return _d('hue').value||'';
  if(key==='vc'){const v=_d('value_').value,c=_d('chroma').value,h=_d('hue').value;return (v&&(c||h==='N'))?(h==='N'?v+'/':v+'/'+c):'';}
  if(key==='konnyu'){const n=document.querySelectorAll('#konnyuList .konkyu-item').length;return n?n+'件':'';}
