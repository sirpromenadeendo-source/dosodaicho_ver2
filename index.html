<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>土層台帳 ワークスペース試作</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{--navy:#2c5f8a;--navy-d:#1a3f60;--navy-dd:#152a3e;--ac:#4fc3f7;--line:#dbe3ec;--ink:#213041;--dim:#7d8da3}
  html,body{margin:0;height:100%;font-family:-apple-system,"Hiragino Kaku Gothic ProN",sans-serif;color:var(--ink);background:#eef2f6}
  body{display:flex;flex-direction:column;height:100vh;overflow:hidden}
  /* ヘッダー */
  header{background:var(--navy);color:#fff;padding:8px 14px;display:flex;align-items:center;gap:12px;flex:none}
  header .ttl{font-weight:700;font-size:16px;letter-spacing:.04em}
  header .genba{flex:1;display:flex;align-items:center;gap:6px}
  header .genba label{font-size:11px;color:#b9d3e8}
  header .genba input{flex:1;max-width:340px;border:none;border-radius:6px;padding:6px 10px;font-size:14px;background:#fff}
  /* 本体 2ペイン */
  .stage{flex:1;display:flex;flex-direction:column;min-height:0}
  /* 上：スロット群 */
  .slots-wrap{flex:none;background:#fff;border-bottom:2px solid var(--navy);padding:10px 12px;overflow:auto;max-height:46%}
  .slots{display:grid;grid-template-columns:repeat(6,1fr);gap:7px}
  .slot{grid-column:span 2;text-align:left;border:1px solid var(--line);border-left:4px solid var(--line);border-radius:8px;background:#fbfcfe;padding:7px 10px;cursor:pointer;display:flex;flex-direction:column;gap:2px;min-height:52px;transition:border-color .12s,background .12s}
  .slot .lb{font-size:10.5px;color:var(--dim);letter-spacing:.02em}
  .slot .vl{font-size:16px;font-weight:700;color:var(--ink);line-height:1.25;display:flex;align-items:center;gap:6px;min-height:20px}
  .slot .vl.empty{color:#b7c2cf;font-weight:500}
  .slot.active{border-color:var(--navy);border-left-color:var(--ac);background:#eef6fc}
  .slot .sw{width:16px;height:16px;border-radius:3px;border:1px solid #b7c2cf;flex:none}
  .slot.wide{grid-column:span 3}
  .slot.full{grid-column:span 6}
  .slot .badge{font-size:11px;background:var(--navy);color:#fff;border-radius:10px;padding:1px 8px;font-weight:700}
  /* 下：ワークスペース */
  .ws{flex:1;min-height:0;display:flex;flex-direction:column;background:#f4f7fa}
  .ws-head{flex:none;padding:9px 14px;background:var(--navy-dd);color:#fff;display:flex;align-items:center;gap:8px}
  .ws-head .k{font-size:11px;color:#9fc3e0}
  .ws-head .t{font-size:15px;font-weight:700}
  .ws-head .hint{margin-left:auto;font-size:11px;color:#9fb6cd}
  .ws-body{flex:1;overflow:auto;padding:14px}
  /* エディタ部品 */
  .opt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(78px,1fr));gap:8px}
  .opt{border:1px solid var(--line);border-radius:8px;background:#fff;padding:12px 6px;font-size:15px;font-weight:600;color:var(--ink);cursor:pointer;text-align:center}
  .opt.sel{background:var(--navy);color:#fff;border-color:var(--navy)}
  .opt.blank{color:#aab4c0;font-weight:500}
  .pad{max-width:320px;margin:0 auto}
  .pad-disp{font-size:34px;font-weight:800;text-align:center;padding:8px;border:2px solid var(--navy);border-radius:10px;background:#fff;letter-spacing:.06em;margin-bottom:12px;color:var(--navy)}
  .pad-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
  .key{padding:16px;font-size:22px;font-weight:700;border:1px solid var(--line);border-radius:10px;background:#fff;cursor:pointer;text-align:center}
  .key.act{background:#eef6fc}
  .key.wide{grid-column:span 1}
  textarea.ws-text,input.ws-text{width:100%;border:1px solid var(--line);border-radius:8px;padding:12px;font-size:16px;font-family:inherit;background:#fff}
  textarea.ws-text{min-height:120px;resize:vertical}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .chip{border:1px solid var(--line);background:#fff;border-radius:16px;padding:6px 12px;font-size:13px;cursor:pointer}
  /* Hue格子・VC格子 */
  .hue-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:520px}
  .hue-cell{padding:14px 4px;font-size:15px;font-weight:700;border:1px solid #c9d3de;border-radius:8px;cursor:pointer;text-align:center;color:#213041}
  .hue-cell.sel{outline:3px solid var(--ac);outline-offset:-3px}
  .vc-hueline{font-size:13px;color:#556;margin-bottom:10px}
  .vc-hueline b{color:var(--navy);font-size:16px}
  .vc-hueline button{margin-left:10px;font-size:12px;padding:4px 10px;border:1px solid var(--line);border-radius:6px;background:#fff;color:var(--navy);cursor:pointer}
  table.vc{border-collapse:collapse}
  table.vc th{background:#e9eef4;color:#456;font-size:12px;padding:4px 6px;border:1px solid #d5dee7}
  table.vc td{border:1px solid #d5dee7;padding:0}
  .vc-cell{width:100%;min-height:46px;min-width:52px;border:none;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px}
  .vc-cell .cd{font-size:12px;font-weight:700}
  .vc-cell .nm{font-size:10px;opacity:.85}
  .vc-cell.sel{outline:3px solid #e67e22;outline-offset:-3px}
  .vc-empty{background:repeating-linear-gradient(45deg,#f4f4f4,#f4f4f4 4px,#eaeaea 4px,#eaeaea 8px)}
  /* 混入物 */
  .kn-list{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
  .kn-item{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:14px}
  .kn-item .x{margin-left:auto;color:#e74c3c;cursor:pointer;font-weight:700;padding:2px 6px}
  .kn-add{background:#fff;border:1px dashed var(--navy);border-radius:8px;padding:12px}
  .kn-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  .kn-row select,.kn-row input{border:1px solid var(--line);border-radius:6px;padding:8px;font-size:14px}
  /* 結果バー */
  .result{flex:none;background:#fff;border-top:2px solid var(--navy);padding:8px 14px;display:flex;align-items:center;gap:14px;overflow:auto}
  .result .cell{display:flex;flex-direction:column;gap:1px;flex:none}
  .result .cl{font-size:10px;color:var(--dim)}
  .result .cv{font-size:14px;font-weight:700}
  .result .allbox{flex:1;min-width:220px}
  .result .allv{font-size:13px;font-weight:500;color:#2b3a4b;line-height:1.35}
  .result .sw{width:20px;height:20px;border-radius:4px;border:1px solid #b7c2cf}
  /* アクション */
  .actions{flex:none;display:grid;grid-template-columns:2fr 2fr 1fr;gap:8px;padding:8px 12px;background:#e7edf3}
  .btn{border:none;border-radius:9px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;color:#fff}
  .btn.save{background:#27ae60}
  .btn.next{background:#3498db}
  .btn.reset{background:#8a97a6}
  @media(max-width:820px){
    .slots{grid-template-columns:repeat(4,1fr)}
    .slot,.slot.wide{grid-column:span 2}.slot.full{grid-column:span 4}
    .slots-wrap{max-height:42%}
  }
</style>
</head>
<body>
<header>
  <span class="ttl">🏛 土層台帳</span>
  <span class="genba"><label>現場名</label><input id="genba" placeholder="例：○○遺跡" oninput="st.genba=this.value"></span>
  <button class="btn" style="background:#1a3f60;padding:8px 14px" onclick="alert('試作のため一覧・設定は省略しています')">一覧 / 設定</button>
</header>

<div class="stage">
  <div class="slots-wrap"><div class="slots" id="slots"></div></div>
  <div class="ws">
    <div class="ws-head"><span class="k">編集中</span><span class="t" id="wsTitle">遺構種別</span><span class="hint" id="wsHint"></span></div>
    <div class="ws-body" id="wsBody"></div>
  </div>
  <div class="result" id="result"></div>
  <div class="actions">
    <button class="btn save" onclick="save()">💾 保存する</button>
    <button class="btn next" onclick="save(true)">＋ 追加して次層へ</button>
    <button class="btn reset" onclick="resetAll()">リセット</button>
  </div>
</div>

// ===== 実色補正（本アプリと同一） =====
const MUTE_K=0.30,RED_KEEP=0.20,RED_BOOST=1.12,CHR_BRIGHT=0.30,RED_HUES=new Set(['7.5R','10R','2.5YR','5YR','5R']);
function _mute(hex,hue,chroma){
  if(!hex)return hex;
  const isRed=hue&&RED_HUES.has(hue);const k=isRed?MUTE_K*RED_KEEP:MUTE_K;
  let r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
  const y=0.299*r+0.587*g+0.114*b;
  if(isRed&&RED_BOOST!==1){r=y+(r-y)*RED_BOOST;g=y+(g-y)*RED_BOOST;b=y+(b-y)*RED_BOOST}
  const lift=0.03,bl=x=>Math.min(1,Math.max(0,(1-k)*x+k*y)*(1-lift)+lift);r=bl(r);g=bl(g);b=bl(b);
  const cf=parseFloat(chroma)||0;
  if(cf>0){const yy=0.299*r+0.587*g+0.114*b,s=1+CHR_BRIGHT*Math.min(1,cf/8)*(1-yy);r=Math.min(1,r*s);g=Math.min(1,g*s);b=Math.min(1,b*s)}
  const h=x=>Math.round(x*255).toString(16).padStart(2,'0');return '#'+h(r)+h(g)+h(b);
}
function hexOf(hue,val,chr){if(!hue||!val)return null;const c=(hue==='N')?(COLOR_HEX['N'+val+'/']||COLOR_HEX['N'+val+'/0']):COLOR_HEX[hue+val+'/'+chr];return c?_mute(c,hue,chr):null}
function nameOf(hue,val,chr){if(!hue||!val)return null;return hue==='N'?(COLOR_MASTER['N'+val+'/']||COLOR_MASTER['N'+val+'/0']):COLOR_MASTER[hue+val+'/'+chr]||null}

function slotValue(key){
  if(key==='hue')return st.hue||'';
  if(key==='vc')return (st.value_&&(st.chroma||st.hue==='N'))?(st.hue==='N'?st.value_+'/':st.value_+'/'+st.chroma):'';
  if(key==='konnyu')return st.konnyu.length?st.konnyu.length+'件':'';
  return st[key]||'';
}
function renderSlots(){
  $('slots').innerHTML=ORDER.map(key=>{
    const f=F[key],v=slotValue(key);
    const cls='slot'+(f.span===3?' wide':f.span===6?' full':'')+(active===key?' active':'');
    let inner;
    if(key==='konnyu'){
      inner=`<span class="vl">${v?`<span class="badge">${v}</span>`:'<span class="empty">なし</span>'}</span>`;
    }else if(key==='hue'){
      inner=`<span class="vl ${st.hue?'':'empty'}">${st.hue||'—'}</span>`;
    }else if(key==='vc'){
      const hx=hexOf(st.hue,st.value_,st.chroma);
      const sw=hx?`<span class="sw" style="background:${hx}"></span>`:'';
      inner=`<span class="vl ${v?'':'empty'}">${sw}${v||'—'}</span>`;
    }else{
      inner=`<span class="vl ${v?'':'empty'}">${v||'—'}</span>`;
    }
    return `<button class="${cls}" onclick="selectField('${key}')"><span class="lb">${f.label}</span>${inner}</button>`;
  }).join('');
}

// ===== フィールド選択→ワークスペース =====
function selectField(key){active=key;padBuf='';renderSlots();renderWS();}
function renderWS(){
  const f=F[active];
  $('wsTitle').textContent=f.label;
  $('wsHint').textContent={list:'タップで選択',num:'数字を入力',hue:'色相を選ぶ→Value/Chromaへ',vc:'マスをタップ',text:'入力',konnyu:'追加・削除'}[f.type]||'';
  const b=$('wsBody');
  if(f.type==='list')b.innerHTML=wsList(active,f.master);
  else if(f.type==='num')b.innerHTML=wsPad(active,f);
  else if(f.type==='hue')b.innerHTML=wsHue();
  else if(f.type==='vc')b.innerHTML=wsVC();
  else if(f.type==='text')b.innerHTML=wsText(active,f);
  else if(f.type==='konnyu')b.innerHTML=wsKonnyu();
}
function wsList(key,master){
  const cur=st[key];
  const cells=MASTERS[master].map(v=>`<button class="opt${v===cur?' sel':''}" onclick="setVal('${key}','${v}')">${v}</button>`).join('');
  const clr=`<button class="opt blank${cur===''?' sel':''}" onclick="setVal('${key}','')">クリア</button>`;
  return `<div class="opt-grid">${cells}${clr}</div>`;
}
function wsPad(key,f){
  const cur=st[key]||'';
  const disp=cur?(f.pad?cur.padStart(f.pad,'0'):cur):'—';
  const keys=['1','2','3','4','5','6','7','8','9','⌫','0','C'];
  return `<div class="pad"><div class="pad-disp">${disp}</div><div class="pad-grid">`+
    keys.map(k=>`<button class="key" onclick="padTap('${key}','${k}')">${k}</button>`).join('')+`</div></div>`;
}
function wsText(key,f){
  const tag=(key==='seikaku'||key==='futai')?'input':'textarea';
  const el=tag==='input'
    ?`<input class="ws-text" id="wsInput" placeholder="${f.ph||''}" value="${(st[key]||'').replace(/"/g,'&quot;')}" oninput="setText('${key}',this.value)">`
    :`<textarea class="ws-text" id="wsInput" placeholder="${f.ph||''}" oninput="setText('${key}',this.value)">${st[key]||''}</textarea>`;
  return el;
}
function wsHue(){
  return `<div class="hue-grid">`+MASTERS.hue.map(h=>{
    const rep=_mute(h==='N'?(COLOR_HEX['N5/']||COLOR_HEX['N5/0']):(COLOR_HEX[h+'5/6']||COLOR_HEX[h+'4/6']||COLOR_HEX[h+'5/4']||'#cccccc'),h,6)||'#ccc';
    const sel=h===st.hue?' sel':'';
    return `<button class="hue-cell${sel}" style="background:${rep};color:${txtOn(rep)}" onclick="pickHue('${h}')">${h}</button>`;
  }).join('')+`</div>`;
}
function txtOn(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return (0.299*r+0.587*g+0.114*b)/255>0.6?'#222':'#fff'}
function wsVC(){
  if(!st.hue)return `<div style="color:#667">先に Hue を選んでください。<button class="chip" onclick="selectField('hue')">Hueを選ぶ</button></div>`;
  // 実在する value/chroma を収集
  const vals=new Set(),chs=new Set(),cells={};
  Object.keys(COLOR_MASTER).forEach(code=>{const m=code.match(/^([0-9.]*[A-Z]+)([0-9.]+)\/([0-9.]*)$/);if(!m||m[1]!==st.hue)return;vals.add(m[2]);if(m[3]!==''&&m[3]!=='0')chs.add(m[3]);cells[m[2]+'|'+m[3]]=COLOR_MASTER[code]});
  const vArr=[...vals].sort((a,b)=>parseFloat(b)-parseFloat(a));
  let line=`<div class="vc-hueline">Hue: <b>${st.hue}</b><button onclick="selectField('hue')">Hueを変更</button></div>`;
  if(st.hue==='N'){
    return line+`<table class="vc"><thead><tr><th>Value</th><th>土色名</th></tr></thead><tbody>`+
      vArr.map(v=>{const nm=cells[v+'|']||cells[v+'|0']||'';const hx=hexOf('N',v,'')||'#fff';const s=v===st.value_?' sel':'';
        return `<tr><td style="background:${hx}"><button class="vc-cell${s}" style="color:${txtOn(hx)}" onclick="pickVC('${v}','')"><span class="cd">${v}/</span></button></td><td style="padding:4px 10px;font-size:12px;color:#456">${nm}</td></tr>`}).join('')+`</tbody></table>`;
  }
  const cArr=[...chs].sort((a,b)=>parseFloat(a)-parseFloat(b));
  const head=`<tr><th>V＼C</th>`+cArr.map(c=>`<th>${c}</th>`).join('')+`</tr>`;
  const rows=vArr.map(v=>`<tr><th>${v}</th>`+cArr.map(c=>{
    const nm=cells[v+'|'+c];if(!nm)return `<td class="vc-empty"></td>`;
    const hx=hexOf(st.hue,v,c)||'#eee';const s=(v===st.value_&&c===st.chroma)?' sel':'';
    return `<td style="background:${hx}"><button class="vc-cell${s}" style="color:${txtOn(hx)}" onclick="pickVC('${v}','${c}')"><span class="cd">${v}/${c}</span><span class="nm">${nm}</span></button></td>`;
  }).join('')+`</tr>`).join('');
  return line+`<div style="overflow:auto"><table class="vc"><thead>${head}</thead><tbody>${rows}</tbody></table></div>`;
}
function wsKonnyu(){
  const list=st.konnyu.length?st.konnyu.map((k,i)=>`<div class="kn-item"><span>${k.type}${k.min?`（${k.min}${k.max&&k.max!==k.min?'〜'+k.max:''}${k.unit}）`:''}${k.kata||''}${k.ryo}</span><span class="x" onclick="delKon(${i})">×</span></div>`).join(''):'<div style="color:#889;margin-bottom:10px">まだありません</div>';
  const opt=(arr,id)=>`<select id="${id}">`+arr.map(v=>`<option>${v}</option>`).join('')+`</select>`;
  return `<div class="kn-list">${list}</div>
    <div class="kn-add"><div class="kn-row">
      ${opt(MASTERS.konnyuType,'knType')}
      ${opt(MASTERS.konnyuKata,'knKata')}
      <span>粒径</span>${opt(MASTERS.konnyuMm,'knMin')}〜${opt(MASTERS.konnyuMm,'knMax')}
      ${opt(['mm','cm'],'knUnit')}
      ${opt(MASTERS.konnyuRyo,'knRyo')}
      <button class="btn next" style="padding:8px 16px" onclick="addKon()">＋ 追加</button>
    </div></div>`;
}

// ===== 値のセット =====
function setVal(key,v){st[key]=v;renderSlots();renderWS();updateResult();}
function setText(key,v){st[key]=v;renderSlots();updateResult();}
function padTap(key,k){
  let cur=st[key]||'';
  if(k==='C')cur='';
  else if(k==='⌫')cur=cur.slice(0,-1);
  else{const nx=cur+k;if(parseInt(nx,10)<=F[key].max)cur=nx.replace(/^0+(?=\d)/,'')}
  st[key]=cur;renderSlots();renderWS();updateResult();
}
function pickHue(h){st.hue=h;if(h==='N')st.chroma='';renderSlots();updateResult();selectField('vc');}
function pickVC(v,c){st.value_=v;st.chroma=c;renderSlots();updateResult();renderWS();}
function addKon(){
  st.konnyu.push({type:$('knType').value,kata:$('knKata').value,min:$('knMin').value,max:$('knMax').value,unit:$('knUnit').value,ryo:$('knRyo').value});
  renderSlots();renderWS();updateResult();
}
function delKon(i){st.konnyu.splice(i,1);renderSlots();renderWS();updateResult();}

// ===== 結果（記載文プレビュー） =====
function konnyuText(){
  if(!st.konnyu.length)return '';
  return st.konnyu.map(k=>`${k.type}${k.min?`（${k.min}${k.max&&k.max!==k.min?'〜'+k.max:''}${k.unit}）`:''}${k.ryo}含む`).join('、');
}
function buildAll(){
  const code=(st.ikoType&&st.ikoNum)?`${st.ikoType}${st.ikoNum.padStart(2,'0')}`:'';
  const cname=nameOf(st.hue,st.value_,st.chroma);
  const ccode=st.hue&&st.value_?(st.hue==='N'?`N${st.value_}/`:`${st.hue}${st.value_}/${st.chroma}`):'';
  const parts=[];
  if(st.soban)parts.push(`第${st.soban}層`);
  if(st.seikaku)parts.push(st.seikaku);
  if(cname)parts.push(`${cname}(${ccode})`);
  if(st.doshu)parts.push(st.doshu);
  const kt=konnyuText();if(kt)parts.push(kt);
  if(st.shimari)parts.push(`締まりは${st.shimari}`);
  if(st.nendo)parts.push(`粘性${st.nendo}`);
  if(st.biko)parts.push(st.biko);
  return {code,cname,ccode,all:parts.join('、')};
}
function updateResult(){
  const r=buildAll();const hx=hexOf(st.hue,st.value_,st.chroma);
  $('result').innerHTML=
    `<div class="cell"><span class="cl">遺構コード</span><span class="cv">${r.code||'—'}</span></div>`+
    `<div class="cell"><span class="cl">色コード</span><span class="cv">${r.ccode||'—'}</span></div>`+
    `<div class="cell"><span class="cl">土色</span><span class="cv" style="display:flex;align-items:center;gap:6px"><span class="sw" style="background:${hx||'transparent'}"></span>${r.cname||'—'}</span></div>`+
    `<div class="cell allbox"><span class="cl">全体記載文</span><span class="allv">${r.all||'（入力中）'}</span></div>`;
}

// ===== アクション（試作） =====
function save(next){
  const r=buildAll();
  if(!st.ikoType||!st.ikoNum||!st.soban){alert('遺構種別・遺構番号・層番は必須です');return}
  alert((next?'保存して次層へ（試作）\n\n':'保存しました（試作）\n\n')+r.all);
  if(next){st.soban=st.soban?String(parseInt(st.soban,10)+1):'';st.konnyu=[];renderSlots();updateResult();selectField('hue');}
}
function resetAll(){if(!confirm('入力をリセットします'))return;Object.assign(st,{ikoType:'',ikoNum:'',soban:'',hue:'',value_:'',chroma:'',doshu:'',shimari:'',nendo:'',futai:'',spl:'',seikaku:'',konnyu:[],biko:''});active='ikoType';renderSlots();renderWS();updateResult();}

// init
renderSlots();renderWS();updateResult();
</script>
</body>
</html>
